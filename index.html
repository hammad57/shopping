    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQ0Ckzlgy8GV-uP89ypRHwrMX2Wq-2Mok",
            authDomain: "onlineshoping-bcf3b.firebaseapp.com",
            databaseURL: "https://onlineshoping-bcf3b-default-rtdb.firebaseio.com/",
            projectId: "onlineshoping-bcf3b",
            storageBucket: "onlineshoping-bcf3b.firebasestorage.app",
            messagingSenderId: "634849561995",
            appId: "1:634849561995:web:caa5e8916b5489e1f4f38e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let selected = null;
        let currentUser = null;
        let cartItems = [];
        let userWishlist = {};
        let activeCategory = 'All';
        let paymentMethod = 'Online';
        let isCartOrder = false;
        
        // Auto Scroll Logic for Categories
        let autoScrollInterval;
        let scrollDirection = 1;
        
        function startAutoScroll() {
            const slider = document.getElementById('catSlider');
            if(!slider) return;
            
            // Clear existing interval if any
            if(autoScrollInterval) clearInterval(autoScrollInterval);
            
            autoScrollInterval = setInterval(() => {
                // Pause if user is hovering or touching
                if(slider.matches(':hover') || slider.matches(':active')) return;
                
                slider.scrollLeft += scrollDirection;
                
                // Reverse direction at edges
                if(slider.scrollLeft >= (slider.scrollWidth - slider.clientWidth - 1)) {
                    scrollDirection = -1;
                } else if (slider.scrollLeft <= 0) {
                    scrollDirection = 1;
                }
            }, 30); // Speed of scroll
        }

        auth.onAuthStateChanged(user => {
            currentUser = user;
            document.getElementById('loginBtn').classList.toggle('hidden', !!user);
            document.getElementById('userInfo').classList.toggle('hidden', !user);
            document.getElementById('search').value = "";
            if(user) {
                db.ref(`carts/${user.uid}`).on('value', snap => {
                    cartItems = [];
                    snap.forEach(child => {
                        let item = child.val();
                        item.firebaseKey = child.key;
                        cartItems.push(item);
                    });
                    updateCartUI();
                });
                db.ref(`wishlist/${user.uid}`).on('value', snap => {
                    userWishlist = snap.val() || {};
                    renderGrid();
                });
            } else {
                cartItems = []; userWishlist = {}; updateCartUI(); renderGrid();
            }
        });

        function getLocation() {
            if (navigator.geolocation) {
                const addrField = document.getElementById('uAddr');
                const originalPlaceholder = addrField.placeholder;
                addrField.placeholder = "Detecting location... Please wait.";
                
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                        const data = await response.json();
                        if (data.display_name) {
                            addrField.value = data.display_name;
                            addrField.placeholder = originalPlaceholder;
                        } else {
                            alert("Address not found.");
                        }
                    } catch (error) {
                        alert("Error fetching address details.");
                        addrField.placeholder = originalPlaceholder;
                    }
                }, (error) => {
                    alert("Location access denied or unavailable.");
                    addrField.placeholder = originalPlaceholder;
                }, { enableHighAccuracy: true });
            } else {
                alert("Geolocation is not supported by your browser.");
            }
        }

        function getIcon(name) {
            let n = name.toLowerCase();
            if(n.includes('mobile')) return 'fa-mobile-screen-button';
            if(n.includes('watch')) return 'fa-clock';
            if(n.includes('electronic')) return 'fa-plug';
            if(n.includes('shoe')) return 'fa-shoe-prints';
            if(n.includes('cloth') || n.includes('stitched') || n.includes('apparel')) return 'fa-shirt';
            if(n.includes('cosmetic') || n.includes('makeup')) return 'fa-wand-magic-sparkles';
            if(n.includes('bag') || n.includes('handbag')) return 'fa-bag-shopping';
            if(n.includes('kid')) return 'fa-child-reaching';
            return 'fa-tag';
        }

        db.ref('categories').on('value', snap => {
            const slider = document.getElementById('catSlider');
            const side = document.getElementById('sidebarCatList');
            
            // Professional Category Card UI
            slider.innerHTML = `<button onclick="filterCat('All')" id="btn-All" class="cat-btn min-w-[120px] bg-white/90 backdrop-blur-sm border border-gray-100 py-4 px-2 rounded-[20px] flex flex-col items-center justify-center gap-3 active-cat shadow-[0_4px_15px_-3px_rgba(0,0,0,0.05)] hover:shadow-lg transition-all duration-300">
                <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-xl mb-1"><i class="fa-solid fa-border-all"></i></div>
                <span class="text-[11px] font-black tracking-wide">ALL ITEMS</span>
            </button>`;
            
            snap.forEach(child => {
                const c = child.val();
                if(c.active !== false) {
                    const name = c.name.trim();
                    let iconDisplaySlider = '';
                    let iconDisplaySidebar = '';
                    if (c.image) {
                        iconDisplaySlider = `<img src="${c.image}" class="w-12 h-12 object-cover rounded-full shadow-sm mb-1 ring-2 ring-gray-50 p-0.5 bg-white">`;
                        iconDisplaySidebar = `<img src="${c.image}" class="w-8 h-8 object-cover rounded-full shadow-sm">`;
                    } else {
                        const icon = getIcon(name);
                        iconDisplaySlider = `<div class="w-12 h-12 rounded-full bg-gray-50 text-blue-500 flex items-center justify-center text-xl mb-1"><i class="fa-solid ${icon}"></i></div>`;
                        iconDisplaySidebar = `<div class="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center"><i class="fa-solid ${icon}"></i></div>`;
                    }
                    
                    slider.innerHTML += `<button onclick="filterCat('${name}')" id="btn-${name}" class="cat-btn min-w-[120px] bg-white/90 backdrop-blur-sm border border-gray-100 py-4 px-2 rounded-[20px] flex flex-col items-center justify-center gap-3 shadow-[0_4px_15px_-3px_rgba(0,0,0,0.05)] hover:shadow-lg hover:-translate-y-1 transition-all duration-300 text-gray-600">
                        ${iconDisplaySlider}
                        <span class="text-[11px] font-bold uppercase text-center tracking-wide leading-tight px-1">${name}</span>
                    </button>`;
                    
                    side.innerHTML += `<li><button onclick="filterCat('${name}'); closeSidebar();" class="w-full text-left p-3 rounded-xl font-bold flex items-center gap-3 hover:bg-blue-50 text-gray-700 transition">
                        ${iconDisplaySidebar} ${name}
                    </button></li>`;
                }
            });
            
            // Start Auto Scroll when categories are loaded
            setTimeout(startAutoScroll, 500);
        });

        db.ref('products').on('value', snap => {
            window.prods = []; snap.forEach(c => {
                const p = c.val(); p.id = c.key;
                window.prods.push(p);
            });
            renderGrid();
        });

        function renderGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            let filtered = activeCategory === 'All' ? window.prods : window.prods.filter(p => p.category === activeCategory);
            filtered?.forEach(p => grid.innerHTML += cardTemplate(p));
        }

        const cardTemplate = (p) => {
            const isLiked = userWishlist[p.id] ? 'liked' : '';
            return `<div class="bg-white/90 backdrop-blur-sm rounded-[24px] shadow-[0_4px_20px_-5px_rgba(0,0,0,0.05)] border border-gray-100/50 overflow-hidden relative cursor-pointer hover:shadow-[0_10px_30px_-10px_rgba(0,0,0,0.1)] hover:-translate-y-1 transition-all duration-300 flex flex-col h-full" onclick="view('${p.id}')">
                <div class="relative overflow-hidden aspect-[4/5]">
                    <img src="${p.images[0]}" class="w-full h-full object-cover object-top hover:scale-105 transition-transform duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent opacity-60"></div>
                    <span class="absolute bottom-3 right-3 bg-white/90 backdrop-blur-md text-slate-800 text-[9px] px-2.5 py-1 rounded-full font-black uppercase shadow-sm tracking-wider">${p.code}</span>
                </div>
                <div class="p-4 flex flex-col flex-1 justify-between">
                    <h3 class="font-bold text-xs line-clamp-2 text-gray-800 leading-snug mb-2">${p.name}</h3>
                    <div class="flex justify-between items-center mt-auto pt-2 border-t border-gray-50">
                        <p class="text-blue-600 font-black text-sm tracking-tight">Rs. ${p.price}</p>
                        <button onclick="toggleLike('${p.id}', event)" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-300 hover:text-red-500 hover:bg-red-50 transition shadow-sm"><i class="fa-solid fa-heart ${isLiked}"></i></button>
                    </div>
                </div>
            </div>`;
        };

        function showFullImage(src) {
            document.getElementById('fullImageSrc').src = src;
            document.getElementById('fullImageModal').classList.remove('hidden');
        }
        function closeFullImage() {
            document.getElementById('fullImageModal').classList.add('hidden');
        }

        function view(id) {
            selected = window.prods.find(x => x.id === id);
            document.getElementById('mName').innerText = selected.name;
            document.getElementById('mCode').innerText = selected.code;
            document.getElementById('mDesc').innerText = selected.desc || 'No description provided for this product.';
            document.getElementById('mPrice').innerText = selected.price;
            document.getElementById('modalLikeIcon').querySelector('i').className = `fa-solid fa-heart ${userWishlist[id] ? 'liked' : ''}`;
            
            const optContainer = document.getElementById('pOptionsContainer');
            const optSelect = document.getElementById('pOptionsSelect');
            if(selected.sizes && selected.sizes.length > 0) {
                optSelect.innerHTML = `<option value="">-- Choose Option --</option>` + selected.sizes.map(s => `<option value="${s}">${s}</option>`).join('');
                optContainer.classList.remove('hidden');
            } else { optContainer.classList.add('hidden'); }
            
            const slider = document.getElementById('pSlider');
            const dots = document.getElementById('dotsContainer');
            slider.innerHTML = ''; dots.innerHTML = '';
            
            selected.images.forEach((img, i) => {
                // Professional Double Click Suggestion Badge Overlay
                slider.innerHTML += `
                <div class="relative w-full flex-shrink-0 snap-center">
                    <div class="absolute top-4 left-1/2 -translate-x-1/2 bg-black/70 text-white text-[10px] px-4 py-1.5 rounded-full backdrop-blur-sm pointer-events-none z-10 flex items-center gap-2 animate-pulse shadow-lg font-bold tracking-wide">
                        <i class="fa-solid fa-hand-pointer text-blue-300"></i> Double Tap For Full Screen
                    </div>
                    <img src="${img}" class="w-full h-full object-cover cursor-zoom-in" ondblclick="showFullImage(this.src)">
                </div>`;
                dots.innerHTML += `<div class="slider-dot ${i===0?'active-dot':''}"></div>`;
            });
            document.getElementById('pModal').classList.remove('hidden');
        }

        function shareProduct(id) {
            const p = window.prods.find(x => x.id === id);
            if(!p) return;
            const optSelect = document.getElementById('pOptionsSelect');
            const variation = (!document.getElementById('pOptionsContainer').classList.contains('hidden')) ? optSelect.value : 'N/A';
            let msg = `*🔥 PREMIUM PRODUCT DETAILS 🔥*\n\n`;
            msg += `*Store:* Hammad Online Shopping Centre\n`;
            msg += `*Item:* ${p.name}\n`;
            msg += `*Code:* ${p.code}\n`;
            msg += `*Price:* Rs. ${p.price}\n`;
            msg += `*Option/Size:* ${variation || 'Not selected'}\n`;
            msg += `*Description:* ${p.desc || 'No description available'}\n\n`;
            msg += `*🖼️ Product Images:*\n`;
            p.images.forEach((img, index) => { msg += `Image ${index + 1}: ${img}\n`; });
            const encodedMsg = encodeURIComponent(msg);
            const whatsappUrl = `https://wa.me/923423944508?text=${encodedMsg}`;
            window.open(whatsappUrl, '_blank');
        }

        function openWishlist() {
            if(!currentUser) return openAuth();
            const list = document.getElementById('wishlistItems');
            list.innerHTML = '';
            const likedItems = window.prods.filter(p => userWishlist[p.id]);
            if(likedItems.length === 0) {
                list.innerHTML = `<div class="col-span-2 text-center py-12 flex flex-col items-center opacity-50"><i class="fa-regular fa-heart text-5xl mb-3 text-gray-300"></i><p class="text-gray-500 font-bold">No favorites yet!</p></div>`;
            } else {
                likedItems.forEach(p => {
                    list.innerHTML += `<div class="bg-gray-50 rounded-[20px] p-2 border border-gray-100 relative cursor-pointer hover:shadow-md transition" onclick="closeModal('wishlistModal'); view('${p.id}')">
                        <img src="${p.images[0]}" class="w-full h-32 object-cover rounded-xl mb-2">
                        <p class="text-[10px] font-bold truncate px-1 text-gray-700">${p.name}</p>
                        <p class="text-blue-600 text-[11px] font-black px-1 mt-0.5">Rs. ${p.price}</p>
                        <button onclick="toggleLike('${p.id}', event)" class="absolute top-3 right-3 text-red-500 bg-white/90 backdrop-blur-sm w-7 h-7 rounded-full flex items-center justify-center text-[10px] shadow-sm hover:scale-110 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
                });
            }
            document.getElementById('wishlistModal').classList.remove('hidden');
        }

        function addToCart(id) {
            if(!currentUser) return openAuth();
            const p = window.prods.find(x => x.id === id);
            const optSelect = document.getElementById('pOptionsSelect');
            const variation = (!document.getElementById('pOptionsContainer').classList.contains('hidden')) ? optSelect.value : '';
            if(variation === "" && !document.getElementById('pOptionsContainer').classList.contains('hidden')) return alert("Please Select an Option/Size!");
            
            const btn = event.currentTarget;
            const originalIcon = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
            
            const cartRef = db.ref(`carts/${currentUser.uid}`);
            cartRef.once('value', snap => {
                let foundKey = null;
                snap.forEach(child => { if(child.val().id === id && child.val().variation === variation) foundKey = child.key; });
                
                if(foundKey) {
                    db.ref(`carts/${currentUser.uid}/${foundKey}`).update({ qty: snap.val()[foundKey].qty + 1 }).then(()=>{
                        btn.innerHTML = `<i class="fa-solid fa-check text-green-500"></i>`;
                        setTimeout(()=> btn.innerHTML = originalIcon, 1000);
                    });
                } else {
                    cartRef.push({...p, qty: 1, variation: variation}).then(()=>{
                        btn.innerHTML = `<i class="fa-solid fa-check text-green-500"></i>`;
                        setTimeout(()=> btn.innerHTML = originalIcon, 1000);
                    });
                }
            });
        }

        function removeFromCart(key) { if(currentUser) db.ref(`carts/${currentUser.uid}/${key}`).remove(); }
        function openSidebar() { document.getElementById('sidebarOverlay').classList.remove('hidden'); document.getElementById('sidebarMenu').classList.remove('-translate-x-full'); }
        function closeSidebar() { document.getElementById('sidebarOverlay').classList.add('hidden'); document.getElementById('sidebarMenu').classList.add('-translate-x-full'); }
        function openCart() { document.getElementById('cartModal').classList.remove('hidden'); }
        function openAuth() { document.getElementById('aModal').classList.remove('hidden'); }
        
        function updateCartUI() {
            const list = document.getElementById('cartItemsList');
            const cTop = document.getElementById('cartCount');
            const cTopMob = document.getElementById('cartCountMobile');
            const gTotal = document.getElementById('cartGrandTotal');
            list.innerHTML = ''; let total = 0;
            
            if(cartItems.length === 0) {
                 list.innerHTML = `<div class="text-center py-10 opacity-50"><i class="fa-solid fa-cart-shopping text-5xl mb-3 text-gray-300"></i><p class="text-gray-500 font-bold">Cart is empty</p></div>`;
            }
            
            cartItems.forEach(item => {
                total += parseInt(item.price) * item.qty;
                list.innerHTML += `<div class="flex gap-4 items-center bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <img src="${item.images[0]}" class="w-16 h-16 rounded-xl object-cover shadow-sm">
                    <div class="flex-1">
                        <p class="text-xs font-bold text-gray-800 line-clamp-1">${item.name}</p>
                        ${item.variation ? `<p class="text-[10px] text-gray-500 font-bold mt-0.5">Opt: ${item.variation}</p>` : ''}
                        <p class="text-blue-600 text-xs font-black mt-1">Rs. ${item.price} <span class="text-gray-400 font-normal">x ${item.qty}</span></p>
                    </div>
                    <button onclick="removeFromCart('${item.firebaseKey}')" class="w-8 h-8 rounded-full bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-100 transition shadow-sm"><i class="fa-solid fa-trash text-xs"></i></button>
                </div>`;
            });
            
            cTop.innerText = cartItems.length; cTop.classList.toggle('hidden', cartItems.length === 0);
            cTopMob.innerText = cartItems.length; cTopMob.classList.toggle('hidden', cartItems.length === 0);
            gTotal.innerText = 'Rs. ' + total;
        }

        function search() {
            const val = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            window.prods.filter(p => p.name.toLowerCase().includes(val) || p.code.toLowerCase().includes(val)).forEach(p => grid.innerHTML += cardTemplate(p));
        }

        function toggleLike(id, e) { 
            if(e) e.stopPropagation(); 
            if(!currentUser) return openAuth(); 
            
            // Add a little pop animation class
            if(e && e.currentTarget) {
                e.currentTarget.classList.add('scale-125');
                setTimeout(() => e.currentTarget.classList.remove('scale-125'), 200);
            }
            
            const ref = db.ref(`wishlist/${currentUser.uid}/${id}`); 
            userWishlist[id] ? ref.remove() : ref.set(true); 
        }
        
        function filterCat(name) { 
            activeCategory = name; 
            renderGrid(); 
            document.querySelectorAll('.cat-btn').forEach(b => {
                const isActive = b.id === 'btn-'+name;
                b.classList.toggle('active-cat', isActive);
                if(!isActive) {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-white/90', 'text-gray-600');
                } else {
                    b.classList.remove('bg-white/90', 'text-gray-600');
                }
            }); 
        }
        
        function setPayment(m) { 
            paymentMethod = m; 
            document.getElementById('payOnline').classList.toggle('active', m==='Online'); 
            document.getElementById('payCOD').classList.toggle('active', m==='COD'); 
            document.getElementById('onlineInfo').classList.toggle('hidden', m==='COD'); 
            
            let p = isCartOrder ? cartItems.reduce((a,b)=>a+(parseInt(b.price)*b.qty),0) : parseInt(selected.price); 
            let d = m==='COD' ? 150 : 0; // 150 Delivery charge on COD
            
            document.getElementById('dFee').innerText = 'Rs. ' + d; 
            document.getElementById('fTotal').innerText = 'Rs. ' + (p + d); 
        }
        
        function goConfirm() { 
            if(!document.getElementById('uName').value || !document.getElementById('uPhone').value || !document.getElementById('uAddr').value) {
                return alert("Please fill all delivery details!");
            }
            let p = isCartOrder ? cartItems.reduce((a,b)=>a+(parseInt(b.price)*b.qty),0) : parseInt(selected.price); 
            document.getElementById('fPrice').innerText = 'Rs. ' + p; 
            setPayment(paymentMethod); 
            document.getElementById('step1').classList.add('hidden'); 
            document.getElementById('step2').classList.remove('hidden'); 
        }
        
        function processOrder() {
            if(!currentUser) return openAuth();
            if(paymentMethod === 'Online' && !document.getElementById('uTrx').value) return alert("Please Enter Transaction ID!");

            const custName = document.getElementById('uName').value;
            const custPhone = document.getElementById('uPhone').value;
            const custCity = document.getElementById('uCity').value || 'Not provided';
            const custAddr = document.getElementById('uAddr').value;
            const subtotal = document.getElementById('fPrice').innerText;
            const delivery = document.getElementById('dFee').innerText;
            const totalBill = document.getElementById('fTotal').innerText;
            const trxId = document.getElementById('uTrx').value || "COD";

            let msg = `*🚀 NEW ORDER - HAMMAD ONLINE SHOPPING 🚀*\n\n`;
            msg += `*👤 CUSTOMER INFO*\n`;
            msg += `Name: ${custName}\n`;
            msg += `Phone: ${custPhone}\n`;
            msg += `City: ${custCity}\n`;
            msg += `Address: ${custAddr}\n\n`;

            msg += `*📦 ITEM DETAILS*\n`;
            if (isCartOrder) {
                cartItems.forEach((item, index) => {
                    msg += `${index + 1}. ${item.name}\n`;
                    msg += `   Code: ${item.code}\n`;
                    msg += `   Option: ${item.variation || 'N/A'}\n`;
                    msg += `   Qty: ${item.qty}\n`;
                    msg += `   Price: Rs. ${item.price}\n`;
                    msg += `   Images: ${item.images.join(' , ')}\n\n`;
                });
            } else {
                const variation = document.getElementById('pOptionsSelect').value || 'N/A';
                msg += `Item: ${selected.name}\n`;
                msg += `Code: ${selected.code}\n`;
                msg += `Option: ${variation}\n`;
                msg += `Price: Rs. ${selected.price}\n`;
                msg += `Images: ${selected.images.join(' , ')}\n\n`;
            }

            msg += `*💰 PRICE DETAIL*\n`;
            msg += `Subtotal: ${subtotal}\n`;
            msg += `Delivery: ${delivery}\n`;
            msg += `*Total Bill: ${totalBill}*\n`;
            msg += `Payment: ${paymentMethod}\n`;
            if(paymentMethod === 'Online') msg += `Trx ID: ${trxId}\n`;

            const orderData = { 
                userId: currentUser.uid, 
                details: isCartOrder ? cartItems.map(i => i.name).join(', ') : selected.name, 
                total: totalBill, 
                trxId: trxId, 
                date: new Date().toISOString(),
                customer: { name: custName, phone: custPhone, address: custAddr, city: custCity } 
            };

            db.ref('orders').push(orderData).then(() => {
                const encodedMsg = encodeURIComponent(msg);
                window.open(`https://wa.me/923423944508?text=${encodedMsg}`);
                if(isCartOrder) db.ref(`carts/${currentUser.uid}`).remove();
                closeModal('oModal');
                
                // Reset form
                document.getElementById('step2').classList.add('hidden'); 
                document.getElementById('step1').classList.remove('hidden');
                document.getElementById('uTrx').value = '';
            });
        }
        
        function closeModal(id) { 
            const modal = document.getElementById(id);
            // Add slight fade out effect before hiding
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.style.opacity = '1';
            }, 200);
        }
        
        function checkoutCart() { if(cartItems.length === 0) return alert("Your cart is empty!"); isCartOrder = true; closeModal('cartModal'); document.getElementById('oModal').classList.remove('hidden'); }
        function openOrder() { isCartOrder = false; closeModal('pModal'); document.getElementById('oModal').classList.remove('hidden'); }
        function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).then(()=>closeModal('aModal')).catch(e=>alert(e.message)); }
        function register() { auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).then(()=>closeModal('aModal')).catch(e=>alert(e.message)); }
        function logout() { auth.signOut(); }

        document.getElementById('pSlider').addEventListener('scroll', (e) => {
            const index = Math.round(e.target.scrollLeft / e.target.clientWidth);
            document.querySelectorAll('.slider-dot').forEach((dot, i) => dot.classList.toggle('active-dot', i === index));
        });
    </script>
</body>
</html>
