<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Store | Premium Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }
        .liked { color: #ef4444 !important; }
        .active-cat { background-color: #2563eb !important; color: white !important; border-color: #2563eb !important; }
        .payment-option.active { border-color: #2563eb; background-color: #eff6ff; }
        .slider-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; transition: 0.3s; }
        .active-dot { background: #2563eb; width: 15px; border-radius: 10px; }
        /* Safe area padding for mobile screens */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="openSidebar()" class="text-gray-600 text-xl h-9 w-9 flex items-center justify-center border rounded-full bg-gray-50">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 class="text-2xl font-black text-blue-600 tracking-tighter">STORE</h1>
            </div>
            
            <div class="flex items-center gap-1">
                <button onclick="openWishlist()" class="text-gray-600 p-2"><i class="fa-solid fa-heart text-xl"></i></button>
                <button onclick="openCart()" class="relative text-gray-600 p-2">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span id="cartCount" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
                </button>
                <button onclick="openAuth()" id="loginBtn" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-sm font-bold ml-2">Login</button>
                <div id="userInfo" class="hidden flex items-center gap-2">
                    <button onclick="openOrders()" class="text-blue-600 text-xs font-bold bg-blue-50 p-2 rounded-lg">Orders</button>
                    <button onclick="logout()" class="text-red-500 text-xs font-bold p-2"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 hidden z-[80] backdrop-blur-sm" onclick="closeSidebar()"></div>
    <div id="sidebarMenu" class="fixed top-0 left-0 w-72 h-full bg-white z-[90] transform -translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-blue-600 text-white">
            <h2 class="font-bold text-xl">Main Menu</h2>
            <button onclick="closeSidebar()" class="text-2xl">×</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <ul id="sidebarCatList" class="space-y-2"></ul>
            <hr>
            <a href="https://hammad57.github.io/shopping/help.html" class="flex items-center gap-3 p-3 font-bold text-gray-700 hover:bg-gray-50 rounded-xl">
                <i class="fa-solid fa-headset text-blue-500"></i> Help & Support
            </a>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 pb-28">
        <div class="relative mb-6">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-400"></i>
            <input type="text" id="search" placeholder="Search by name or code..." onkeyup="search()" class="w-full p-4 pl-12 rounded-2xl border-none shadow-sm outline-blue-500 text-sm">
        </div>

        <div id="catSlider" class="flex gap-3 overflow-x-auto no-scrollbar snap-x mb-8 pb-2"></div>

        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </div>

    <div class="fixed bottom-4 left-1/2 transform -translate-x-1/2 w-[95%] max-w-md bg-white/90 backdrop-blur-xl border border-gray-100 shadow-[0_10px_40px_rgba(0,0,0,0.1)] rounded-[32px] z-40 flex justify-between items-center px-6 py-3 pb-safe">
        <button onclick="goHome()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition">
            <i class="fa-solid fa-house text-[20px]"></i>
            <span class="text-[9px] font-black uppercase tracking-wider">Home</span>
        </button>
        <button onclick="checkAuthAndOpen(openOrders)" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition">
            <i class="fa-solid fa-clipboard-list text-[20px]"></i>
            <span class="text-[9px] font-black uppercase tracking-wider">Orders</span>
        </button>
        <button onclick="openCart()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition relative">
            <i class="fa-solid fa-cart-shopping text-[20px]"></i>
            <span class="text-[9px] font-black uppercase tracking-wider">Cart</span>
            <span id="bottomCartCount" class="absolute -top-1 -right-2 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span>
        </button>
        <button onclick="checkAuthAndOpen(openWishlist)" class="flex flex-col items-center gap-1 text-gray-400 hover:text-red-500 transition">
            <i class="fa-solid fa-heart text-[20px]"></i>
            <span class="text-[9px] font-black uppercase tracking-wider">Likes</span>
        </button>
        <a href="https://hammad57.github.io/shopping/help.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition">
            <i class="fa-solid fa-headset text-[20px]"></i>
            <span class="text-[9px] font-black uppercase tracking-wider">Help</span>
        </a>
    </div>

    <div id="pModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] overflow-hidden relative flex flex-col max-h-[90vh]">
            <button onclick="closeModal('pModal')" class="absolute top-4 right-4 bg-white rounded-full w-8 h-8 z-50 font-bold shadow-lg flex items-center justify-center hover:bg-red-50 hover:text-red-500 transition">×</button>
            <div class="relative">
                <div id="pSlider" class="w-full h-72 flex overflow-x-auto snap-x no-scrollbar scroll-smooth"></div>
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1" id="dotsContainer"></div>
            </div>
            <div class="p-6 overflow-y-auto">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="mName" class="text-xl font-black text-gray-800"></h2>
                        <span id="mCode" class="text-[10px] text-blue-600 font-bold uppercase"></span>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black text-green-600">Rs. <span id="mPrice"></span></p>
                    </div>
                </div>
                <p id="mDesc" class="text-gray-500 text-sm mt-4 leading-relaxed"></p>
                
                <div id="pOptionsContainer" class="mt-4 mb-2 hidden bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <label class="text-xs font-black text-blue-600 uppercase tracking-wider block mb-1"><i class="fa-solid fa-list-check"></i> Select Size / Color</label>
                    <select id="pOptionsSelect" class="w-full p-2 bg-white border border-gray-200 rounded-lg outline-blue-500 text-sm font-bold text-gray-800 cursor-pointer">
                        <option value="">-- Choose Option --</option>
                    </select>
                </div>

                <div class="flex gap-2 mt-6">
                    <button onclick="shareProduct(selected.id)" class="w-14 h-14 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center text-xl hover:bg-blue-100 transition"><i class="fa-solid fa-share-nodes"></i></button>
                    <button onclick="toggleLike(selected.id, event)" id="modalLikeIcon" class="w-14 h-14 rounded-2xl bg-gray-100 flex items-center justify-center text-xl transition hover:bg-red-50"><i class="fa-solid fa-heart"></i></button>
                    <button onclick="addToCart(selected.id)" class="w-14 h-14 rounded-2xl bg-orange-100 text-orange-600 flex items-center justify-center text-xl hover:bg-orange-200 transition"><i class="fa-solid fa-cart-plus"></i></button>
                    <button onclick="openOrder()" class="flex-1 bg-blue-600 text-white font-bold rounded-2xl shadow-lg hover:bg-blue-700 transition">Order Now</button>
                </div>
            </div>
        </div>
    </div>

    <div id="oModal" class="fixed inset-0 bg-black/80 hidden z-[70] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-6 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div id="step1">
                <h3 class="text-xl font-black mb-4 flex items-center gap-2"><i class="fa-solid fa-truck"></i> Delivery Details</h3>
                <div class="space-y-3">
                    <input type="text" id="uName" placeholder="Full Name" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none outline-blue-500">
                    <input type="tel" id="uPhone" placeholder="Mobile Number" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none outline-blue-500">
                    <input type="text" id="uCity" placeholder="City" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none outline-blue-500">
                    
                    <div class="relative">
                        <textarea id="uAddr" placeholder="Complete Address" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none outline-blue-500" rows="3"></textarea>
                        <button onclick="getCurrentLocation()" class="absolute bottom-2 right-2 bg-blue-100 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 shadow-sm">
                            <i class="fa-solid fa-location-crosshairs"></i> Current Location
                        </button>
                    </div>
                </div>
                <button onclick="goConfirm()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mt-6 shadow-lg hover:bg-blue-700 transition">Confirm Address</button>
                <button onclick="closeModal('oModal')" class="w-full mt-2 text-gray-400 text-xs font-bold hover:text-gray-600 transition">Cancel</button>
            </div>
            
            <div id="step2" class="hidden text-center">
                <h3 class="text-xl font-black mb-6">Payment Method</h3>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="setPayment('Online')" id="payOnline" class="payment-option border-2 p-4 rounded-2xl flex flex-col items-center gap-2 active">
                        <i class="fa-solid fa-building-columns text-blue-600 text-xl"></i>
                        <span class="text-[10px] font-bold uppercase">Online Pay</span>
                    </button>
                    <button onclick="setPayment('COD')" id="payCOD" class="payment-option border-2 p-4 rounded-2xl flex flex-col items-center gap-2">
                        <i class="fa-solid fa-hand-holding-dollar text-green-600 text-xl"></i>
                        <span class="text-[10px] font-bold uppercase">Cash on Delivery</span>
                    </button>
                </div>
                
                <div id="onlineInfo" class="bg-blue-50 p-4 rounded-xl mb-4 text-[11px] text-left border border-blue-100">
                    <p class="font-bold text-blue-800">Easypaisa: 03423944508 (Muluk Hussain)</p>
                    <input type="text" id="uTrx" placeholder="Enter Transaction ID" class="w-full p-2 mt-2 bg-white rounded border text-center font-bold outline-none">
                </div>

                <div class="bg-slate-50 p-4 rounded-xl mb-4 space-y-1 text-sm font-bold border border-slate-100">
                    <div class="flex justify-between"><span>Subtotal:</span> <span id="fPrice"></span></div>
                    <div class="flex justify-between text-blue-600"><span>Delivery:</span> <span id="deliveryFeeText">Rs. 0</span></div>
                    <div class="flex justify-between text-lg border-t pt-2 mt-1"><span>Total Bill:</span> <span id="fTotal"></span></div>
                </div>

                <button onclick="processOrder()" class="w-full bg-green-500 hover:bg-green-600 transition text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-xl">
                    <i class="fa-brands fa-whatsapp text-2xl"></i> Send WhatsApp Order
                </button>
                <button onclick="document.getElementById('step2').classList.add('hidden'); document.getElementById('step1').classList.remove('hidden');" class="w-full mt-4 text-gray-400 text-xs font-bold hover:text-gray-600">Go Back</button>
            </div>
        </div>
    </div>

    <div id="wishlistModal" class="fixed inset-0 bg-black/80 hidden z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 max-h-[80vh] overflow-y-auto relative shadow-2xl">
            <button onclick="closeModal('wishlistModal')" class="absolute top-4 right-4 text-2xl font-bold text-gray-400">×</button>
            <h2 class="text-xl font-black mb-6 flex items-center gap-2"><i class="fa-solid fa-heart text-red-500"></i> My Favorites</h2>
            <div id="wishlistItems" class="grid grid-cols-2 gap-3"></div>
        </div>
    </div>

    <div id="cartModal" class="fixed inset-0 bg-black/80 hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 max-h-[80vh] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-black"><i class="fa-solid fa-cart-shopping text-blue-600"></i> Shopping Cart</h2>
                <button onclick="closeModal('cartModal')" class="text-gray-400 font-bold text-xl hover:text-red-500 transition">×</button>
            </div>
            <div id="cartItemsList" class="flex-1 overflow-y-auto space-y-3 no-scrollbar pr-1"></div>
            <div class="mt-4 border-t pt-4">
                <div class="flex justify-between font-black text-lg text-gray-800"><span>Total:</span> <span id="cartGrandTotal"></span></div>
                <button onclick="checkoutCart()" class="w-full bg-blue-600 hover:bg-blue-700 transition text-white py-4 rounded-2xl font-bold mt-4 shadow-lg">Place Order</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-black/80 hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 max-h-[80vh] overflow-y-auto shadow-2xl">
            <h2 class="text-xl font-black mb-4">Order History</h2>
            <div id="myOrderList" class="space-y-3"></div>
            <button onclick="closeModal('historyModal')" class="w-full mt-6 bg-gray-100 hover:bg-gray-200 py-3 rounded-xl font-bold transition">Close</button>
        </div>
    </div>

    <div id="aModal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 text-center shadow-2xl">
            <h2 class="text-2xl font-black text-blue-600 mb-6 tracking-tighter">Login / Register</h2>
            <input type="email" id="email" placeholder="Email Address" class="w-full p-4 bg-gray-50 rounded-2xl mb-3 border-none outline-blue-500">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 border-none outline-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold mb-2 shadow-lg transition">Login</button>
            <button onclick="register()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 py-4 rounded-2xl font-bold transition">Create Account</button>
            <button onclick="closeModal('aModal')" class="mt-4 text-gray-400 text-xs font-bold uppercase hover:text-gray-600 transition">Close</button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBQ0Ckzlgy8GV-uP89ypRHwrMX2Wq-2Mok",
            authDomain: "onlineshoping-bcf3b.firebaseapp.com",
            databaseURL: "https://onlineshoping-bcf3b-default-rtdb.firebaseio.com/",
            projectId: "onlineshoping-bcf3b",
            storageBucket: "onlineshoping-bcf3b.firebasestorage.app",
            messagingSenderId: "634849561995",
            appId: "1:634849561995:web:caa5e8916b5489e1f4f38e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let selected = null;
        let currentUser = null;
        let cart = [];
        let userWishlist = {};
        let isCartOrder = false;
        let paymentMethod = 'Online';
        let activeCategory = 'All';
        let currentVariation = ''; 

        auth.onAuthStateChanged(user => {
            currentUser = user;
            document.getElementById('loginBtn').classList.toggle('hidden', !!user);
            document.getElementById('userInfo').classList.toggle('hidden', !user);
            if(user) {
                db.ref(`wishlist/${user.uid}`).on('value', snap => {
                    userWishlist = snap.val() || {};
                    renderGrid();
                });
            } else {
                userWishlist = {};
                renderGrid();
            }
        });

        // Naye Helper Functions
        function goHome() {
            closeModal('oModal');
            closeModal('pModal');
            closeModal('cartModal');
            closeModal('wishlistModal');
            closeModal('historyModal');
            closeModal('aModal');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkAuthAndOpen(actionFunc) {
            if(currentUser) {
                actionFunc();
            } else {
                openAuth();
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            let filtered = activeCategory === 'All' ? window.prods : window.prods.filter(p => p.category === activeCategory);
            filtered?.forEach(p => grid.innerHTML += cardTemplate(p));
        }

        const cardTemplate = (p) => {
            const isLiked = userWishlist[p.id] ? 'liked' : '';
            return `<div class="bg-white rounded-[24px] shadow-sm border border-gray-100 overflow-hidden relative cursor-pointer hover:shadow-md transition" onclick="view('${p.id}')">
                <div class="relative">
                    <img src="${p.images[0]}" class="w-full h-40 object-cover object-top">
                    <span class="absolute bottom-2 right-2 bg-black/60 backdrop-blur-sm text-white text-[8px] px-2 py-0.5 rounded-full font-bold uppercase">${p.code}</span>
                </div>
                <div class="p-3">
                    <h3 class="font-bold text-xs truncate text-gray-800">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <p class="text-blue-600 font-black text-sm">Rs. ${p.price}</p>
                        <button onclick="toggleLike('${p.id}', event)" class="text-gray-300 hover:text-red-500 transition"><i class="fa-solid fa-heart ${isLiked}"></i></button>
                    </div>
                </div>
            </div>`;
        };

        async function getCurrentLocation() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Fetching...';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                        const data = await res.json();
                        document.getElementById('uAddr').value = data.display_name;
                        if(data.address && (data.address.city || data.address.town || data.address.village)) {
                            document.getElementById('uCity').value = data.address.city || data.address.town || data.address.village;
                        }
                        btn.innerHTML = originalText;
                    } catch(e) { 
                        btn.innerHTML = originalText;
                        alert("Failed to fetch address. Please type manually."); 
                    }
                }, error => {
                    btn.innerHTML = originalText;
                    alert("Unable to fetch location. Check your device permissions.");
                });
            } else {
                btn.innerHTML = originalText;
                alert("Geolocation not supported.");
            }
        }

        function toggleLike(id, e) {
            if(e) e.stopPropagation();
            if(!currentUser) return openAuth();
            const ref = db.ref(`wishlist/${currentUser.uid}/${id}`);
            userWishlist[id] ? ref.remove() : ref.set(true);
        }

        function shareProduct(id) {
            const p = window.prods.find(x => x.id === id);
            const text = `Check out ${p.name} for Rs.${p.price} at our store!`;
            if (navigator.share) {
                navigator.share({ title: p.name, text: text, url: window.location.href });
            } else {
                prompt("Copy this link to share:", window.location.href);
            }
        }

        db.ref('categories').on('value', snap => {
            const slider = document.getElementById('catSlider');
            const side = document.getElementById('sidebarCatList');
            slider.innerHTML = `<button onclick="filterCat('All')" id="btn-All" class="cat-btn bg-white border min-w-[80px] py-3 rounded-2xl text-[10px] font-bold active-cat shadow-sm transition">ALL</button>`;
            side.innerHTML = `<li><button onclick="filterCat('All'); closeSidebar();" class="w-full text-left p-3 rounded-xl font-bold bg-gray-50 border transition">All Products</button></li>`;
            
            snap.forEach(child => {
                const c = child.val();
                if(c.active !== false) {
                    const name = c.name.trim();
                    slider.innerHTML += `<button onclick="filterCat('${name}')" id="btn-${name}" class="cat-btn bg-white border min-w-[80px] py-3 rounded-2xl text-[10px] font-bold uppercase shadow-sm transition">${name}</button>`;
                    side.innerHTML += `<li><button onclick="filterCat('${name}'); closeSidebar();" class="w-full text-left p-3 rounded-xl font-bold hover:bg-blue-50 border transition">${name}</button></li>`;
                }
            });
        });

        db.ref('products').on('value', snap => {
            window.prods = []; snap.forEach(c => {
                const p = c.val(); p.id = c.key;
                if(p.category) p.category = p.category.trim();
                window.prods.push(p);
            });
            renderGrid();
        });

        // Updated Payment Function for Delivery Charges
        function setPayment(method) {
            paymentMethod = method;
            document.getElementById('payOnline').classList.toggle('active', method === 'Online');
            document.getElementById('payCOD').classList.toggle('active', method === 'COD');
            document.getElementById('onlineInfo').classList.toggle('hidden', method === 'COD');

            // Delivery Logic Application
            let deliveryFee = (method === 'COD') ? 150 : 0;
            document.getElementById('deliveryFeeText').innerText = (deliveryFee > 0) ? 'Rs. ' + deliveryFee : 'Free';
            
            let priceText = document.getElementById('fPrice').innerText.replace('Rs. ', '');
            let basePrice = parseInt(priceText) || 0;
            document.getElementById('fTotal').innerText = 'Rs. ' + (basePrice + deliveryFee);
        }

        function goConfirm() {
            if(!document.getElementById('uName').value || !document.getElementById('uPhone').value || !document.getElementById('uAddr').value) {
                return alert("Please fill your Name, Phone and Complete Address!");
            }
            let price = isCartOrder ? cart.reduce((a,b)=>a+(b.price*b.qty),0) : selected.price;
            document.getElementById('fPrice').innerText = 'Rs. ' + price;
            
            // Auto Update Total and Delivery based on Active Payment Method
            setPayment(paymentMethod); 

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function processOrder() {
            if(!currentUser) return openAuth();
            if(paymentMethod === 'Online' && !document.getElementById('uTrx').value) return alert("Please enter Transaction ID!");
            
            const trx = document.getElementById('uTrx').value || "COD Order";
            const singleOrderText = `${selected.name} (${selected.code})${currentVariation ? ' - Option: ' + currentVariation : ''}`;
            const cartOrderText = cart.map(i => `${i.name} ${i.variation ? '(Opt: '+i.variation+')' : ''} (x${i.qty})`).join(', ');

            const orderData = {
                userId: currentUser.uid, 
                details: isCartOrder ? cartOrderText : singleOrderText,
                total: document.getElementById('fTotal').innerText, 
                trxId: trx, status: "Pending", date: new Date().toLocaleString(), 
                image: isCartOrder ? cart[0].images[0] : selected.images[0],
                method: paymentMethod,
                customer: { name: document.getElementById('uName').value, phone: document.getElementById('uPhone').value, address: document.getElementById('uAddr').value }
            };

            db.ref('orders').push(orderData).then(() => {
                const msg = encodeURIComponent(`*NEW ORDER (${paymentMethod})*\nItems: ${orderData.details}\nTotal: ${orderData.total}\nTrx: ${trx}\nCustomer: ${orderData.customer.name}\nAddress: ${orderData.customer.address}\nCity: ${document.getElementById('uCity').value}`);
                window.open(`https://wa.me/923423944508?text=${msg}`);
                cart = []; updateCartUI(); closeModal('oModal');
            });
        }

        function view(id) {
            selected = window.prods.find(x => x.id === id);
            document.getElementById('mName').innerText = selected.name;
            document.getElementById('mCode').innerText = selected.code;
            document.getElementById('mDesc').innerText = selected.desc || '';
            document.getElementById('mPrice').innerText = selected.price;
            document.getElementById('modalLikeIcon').querySelector('i').className = `fa-solid fa-heart ${userWishlist[id] ? 'liked' : ''}`;
            
            const optContainer = document.getElementById('pOptionsContainer');
            const optSelect = document.getElementById('pOptionsSelect');
            if(selected.sizes && selected.sizes.length > 0) {
                optSelect.innerHTML = `<option value="">-- Choose Option --</option>` + selected.sizes.map(s => `<option value="${s}">${s}</option>`).join('');
                optContainer.classList.remove('hidden');
            } else {
                optContainer.classList.add('hidden');
                optSelect.innerHTML = `<option value="">-- No Option --</option>`;
            }
            
            const slider = document.getElementById('pSlider');
            const dots = document.getElementById('dotsContainer');
            slider.innerHTML = ''; dots.innerHTML = '';
            selected.images.forEach((img, i) => {
                slider.innerHTML += `<div class="w-full flex-shrink-0 snap-center"><img src="${img}" class="w-full h-full object-cover object-top"></div>`;
                dots.innerHTML += `<div class="slider-dot ${i===0?'active-dot':''}"></div>`;
            });
            document.getElementById('pModal').classList.remove('hidden');
        }

        function openOrder() { 
            const optContainer = document.getElementById('pOptionsContainer');
            const optSelect = document.getElementById('pOptionsSelect');
            
            if(!optContainer.classList.contains('hidden') && optSelect.value === "") {
                return alert("Please select a size or color first!");
            }

            isCartOrder = false; 
            currentVariation = optContainer.classList.contains('hidden') ? '' : optSelect.value;
            closeModal('pModal'); 
            document.getElementById('oModal').classList.remove('hidden'); 
            document.getElementById('step1').classList.remove('hidden'); 
            document.getElementById('step2').classList.add('hidden'); 
        }

        function addToCart(id) {
            const p = window.prods.find(x => x.id === id);
            const optContainer = document.getElementById('pOptionsContainer');
            const optSelect = document.getElementById('pOptionsSelect');

            if(!optContainer.classList.contains('hidden') && optSelect.value === "") {
                return alert("Please select a size or color first!");
            }

            const variation = optContainer.classList.contains('hidden') ? '' : optSelect.value;
            const existing = cart.find(i => i.id === id && i.variation === variation);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({...p, qty: 1, variation: variation});
            }
            updateCartUI();
            alert("Added to cart successfully!");
        }

        function search() {
            const val = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            window.prods.filter(p => p.name.toLowerCase().includes(val) || p.code.toLowerCase().includes(val)).forEach(p => grid.innerHTML += cardTemplate(p));
        }

        function filterCat(name) { activeCategory = name; renderGrid(); document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active-cat', b.id === 'btn-'+name)); }
        function openSidebar() { document.getElementById('sidebarOverlay').classList.remove('hidden'); document.getElementById('sidebarMenu').classList.remove('-translate-x-full'); }
        function closeSidebar() { document.getElementById('sidebarOverlay').classList.add('hidden'); document.getElementById('sidebarMenu').classList.add('-translate-x-full'); }
        function openCart() { document.getElementById('cartModal').classList.remove('hidden'); }
        function openAuth() { document.getElementById('aModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        function checkoutCart() { 
            if(cart.length === 0) return alert("Cart is empty!");
            isCartOrder = true; 
            closeModal('cartModal'); 
            document.getElementById('oModal').classList.remove('hidden'); 
            document.getElementById('step1').classList.remove('hidden'); 
            document.getElementById('step2').classList.add('hidden'); 
        }

        // Added Logic to Update Bottom Nav Cart Counter
        function updateCartUI() {
            const list = document.getElementById('cartItemsList');
            const count = document.getElementById('cartCount');
            const bottomCount = document.getElementById('bottomCartCount');
            const total = document.getElementById('cartGrandTotal');
            list.innerHTML = '';
            let grandTotal = 0;
            cart.forEach(item => {
                grandTotal += item.price * item.qty;
                const varText = item.variation ? `<span class="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded ml-1 font-bold">${item.variation}</span>` : '';
                list.innerHTML += `<div class="flex gap-4 items-center bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <img src="${item.images[0]}" class="w-14 h-14 rounded-xl object-cover object-top border border-gray-200 shadow-sm">
                    <div class="flex-1"><p class="text-xs font-bold text-gray-800">${item.name} ${varText}</p><p class="text-blue-600 text-[11px] font-black mt-1">Rs. ${item.price} x ${item.qty}</p></div>
                    <button onclick="removeFromCart('${item.id}', '${item.variation || ''}')" class="text-red-400 hover:text-red-600 bg-white p-2 rounded-lg shadow-sm border"><i class="fa-solid fa-trash-can"></i></button>
                </div>`;
            });
            count.innerText = cart.length;
            count.classList.toggle('hidden', cart.length === 0);
            
            if(bottomCount) {
                bottomCount.innerText = cart.length;
                bottomCount.classList.toggle('hidden', cart.length === 0);
            }
            
            total.innerText = 'Rs. ' + grandTotal;
        }

        function removeFromCart(id, variation) { 
            cart = cart.filter(i => !(i.id === id && (i.variation || '') === variation)); 
            updateCartUI(); 
        }

        function openWishlist() {
            const list = document.getElementById('wishlistItems'); list.innerHTML = '';
            const favs = window.prods.filter(p => userWishlist[p.id]);
            if(favs.length === 0) list.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-10 font-bold">No favorites yet</p>';
            favs.forEach(p => list.innerHTML += cardTemplate(p));
            document.getElementById('wishlistModal').classList.remove('hidden');
        }

        function openOrders() {
            const list = document.getElementById('myOrderList'); list.innerHTML = '<p class="text-center py-4 text-gray-500 font-bold"><i class="fa-solid fa-spinner fa-spin"></i> Loading orders...</p>';
            db.ref('orders').orderByChild('userId').equalTo(currentUser.uid).on('value', snap => {
                list.innerHTML = '';
                if(!snap.exists()) return list.innerHTML = '<p class="text-center py-4 text-gray-400 font-bold">No orders found.</p>';
                snap.forEach(c => {
                    const o = c.val();
                    let badgeColor = "bg-blue-600";
                    if(o.status === "Pending") badgeColor = "bg-red-500";
                    if(o.status === "Shipped") badgeColor = "bg-orange-500";
                    if(o.status === "Delivered") badgeColor = "bg-green-500";
                    list.innerHTML += `<div class="p-4 bg-gray-50 border rounded-2xl flex gap-4"><img src="${o.image}" class="w-14 h-14 object-cover rounded-xl border shadow-sm"><div class="flex-1"><p class="text-[10px] font-bold text-gray-800 leading-tight">${o.details}</p><p class="text-blue-600 font-black text-xs mt-1.5">${o.total}</p><div class="mt-2 text-[9px] px-2.5 py-1 ${badgeColor} text-white rounded-md w-fit uppercase font-bold tracking-wider">${o.status}</div></div></div>`;
                });
            });
            document.getElementById('historyModal').classList.remove('hidden');
        }

        function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).then(()=>closeModal('aModal')).catch(e=>alert(e.message)); }
        function register() { auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).then(()=>closeModal('aModal')).catch(e=>alert(e.message)); }
        function logout() { auth.signOut(); }

        document.getElementById('pSlider').addEventListener('scroll', (e) => {
            const index = Math.round(e.target.scrollLeft / e.target.clientWidth);
            document.querySelectorAll('.slider-dot').forEach((dot, i) => dot.classList.toggle('active-dot', i === index));
        });
    </script>
</body>
</html>
