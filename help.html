<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Store | Premium Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }
        .liked { color: #ef4444 !important; }
        .active-cat { background-color: #2563eb !important; color: white !important; border-color: #2563eb !important; }
        .payment-option.active { border-color: #2563eb; background-color: #eff6ff; }
        .slider-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; transition: 0.3s; }
        .active-dot { background: #2563eb; width: 15px; border-radius: 10px; }
        
        /* Smooth transitions */
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="openSidebar()" class="text-gray-600 text-xl h-10 w-10 flex items-center justify-center border rounded-xl bg-gray-50 hover:bg-gray-100 transition">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <h1 class="text-2xl font-black text-blue-600 tracking-tighter">STORE</h1>
            </div>
            
            <div class="flex items-center gap-1">
                <button onclick="openWishlist()" class="text-gray-600 p-2 hover:bg-red-50 hover:text-red-500 rounded-full transition"><i class="fa-solid fa-heart text-xl"></i></button>
                <button onclick="openCart()" class="relative text-gray-600 p-2 hover:bg-blue-50 hover:text-blue-600 rounded-full transition">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span id="cartCount" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
                </button>
                <button onclick="openAuth()" id="loginBtn" class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-bold ml-2 hover:bg-blue-700 transition shadow-md shadow-blue-200">Login</button>
                <div id="userInfo" class="hidden flex items-center gap-2">
                    <button onclick="openOrders()" class="text-blue-600 text-xs font-bold bg-blue-50 px-3 py-2 rounded-lg border border-blue-100">Orders</button>
                    <button onclick="logout()" class="text-red-500 text-xs font-bold p-2 hover:bg-red-50 rounded-full"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 hidden z-[80] backdrop-blur-sm transition-opacity" onclick="closeSidebar()"></div>
    <div id="sidebarMenu" class="fixed top-0 left-0 w-80 h-full bg-white z-[90] transform -translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
        <div class="p-6 border-b flex justify-between items-center bg-blue-600 text-white">
            <div>
                <h2 class="font-black text-xl">Main Menu</h2>
                <p class="text-[10px] opacity-80 uppercase tracking-widest">Explore Categories</p>
            </div>
            <button onclick="closeSidebar()" class="text-3xl hover:rotate-90 transition-transform">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <p class="text-[11px] font-bold text-gray-400 uppercase ml-2">Browse Store</p>
            <ul id="sidebarCatList" class="space-y-1.5">
                </ul>
            <div class="pt-4 border-t">
                <a href="help.html" class="flex items-center gap-3 p-4 font-bold text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-2xl transition group">
                    <i class="fa-solid fa-headset text-blue-500 group-hover:scale-110 transition"></i> Help & Support
                </a>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4">
        <div class="relative mb-6">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="search" placeholder="Search products, brands, or codes..." onkeyup="search()" class="w-full p-4 pl-12 rounded-2xl border-none shadow-sm outline-none ring-2 ring-transparent focus:ring-blue-500 transition-all bg-white text-sm">
        </div>

        <div id="catSlider" class="flex gap-3 overflow-x-auto no-scrollbar snap-x mb-8 pb-2">
            </div>

        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            </div>
    </div>

    <div id="pModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[32px] overflow-hidden relative flex flex-col max-h-[90vh] modal-animate">
            <button onclick="closeModal('pModal')" class="absolute top-4 right-4 bg-white/80 backdrop-blur-md rounded-full w-10 h-10 z-50 font-bold shadow-lg flex items-center justify-center hover:bg-red-500 hover:text-white transition">×</button>
            <div class="relative">
                <div id="pSlider" class="w-full h-80 flex overflow-x-auto snap-x no-scrollbar scroll-smooth bg-gray-100"></div>
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5" id="dotsContainer"></div>
            </div>
            <div class="p-6 overflow-y-auto">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="mName" class="text-xl font-black text-gray-800 leading-tight"></h2>
                        <span id="mCode" class="inline-block mt-1 text-[10px] text-blue-600 font-bold uppercase bg-blue-50 px-2 py-0.5 rounded"></span>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black text-green-600">Rs. <span id="mPrice"></span></p>
                    </div>
                </div>
                <p id="mDesc" class="text-gray-500 text-sm mt-4 leading-relaxed"></p>
                
                <div id="pOptionsContainer" class="mt-5 mb-2 hidden bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-wider block mb-2"><i class="fa-solid fa-list-check mr-1"></i> Choose Variation</label>
                    <select id="pOptionsSelect" class="w-full p-3 bg-white border border-gray-200 rounded-xl outline-blue-500 text-sm font-bold text-gray-800 shadow-sm cursor-pointer">
                        <option value="">-- Select Size / Color --</option>
                    </select>
                </div>

                <div class="flex gap-2 mt-8">
                    <button onclick="shareProduct(selected.id)" class="w-14 h-14 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center text-xl hover:bg-blue-100 transition"><i class="fa-solid fa-share-nodes"></i></button>
                    <button onclick="toggleLike(selected.id, event)" id="modalLikeIcon" class="w-14 h-14 rounded-2xl bg-gray-100 flex items-center justify-center text-xl transition hover:bg-red-50"><i class="fa-solid fa-heart"></i></button>
                    <button onclick="addToCart(selected.id)" class="w-14 h-14 rounded-2xl bg-orange-100 text-orange-600 flex items-center justify-center text-xl hover:bg-orange-200 transition"><i class="fa-solid fa-cart-plus"></i></button>
                    <button onclick="openOrder()" class="flex-1 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition">Order Now</button>
                </div>
            </div>
        </div>
    </div>

    <div id="oModal" class="fixed inset-0 bg-black/80 hidden z-[70] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-6 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div id="step1">
                <h3 class="text-xl font-black mb-4 flex items-center gap-2"><i class="fa-solid fa-truck-fast text-blue-600"></i> Shipping Info</h3>
                <div class="space-y-3">
                    <input type="text" id="uName" placeholder="Recipient Name" class="w-full p-4 bg-gray-50 rounded-2xl text-sm border-none outline-blue-500 focus:bg-white transition-colors">
                    <input type="tel" id="uPhone" placeholder="Mobile Number" class="w-full p-4 bg-gray-50 rounded-2xl text-sm border-none outline-blue-500 focus:bg-white transition-colors">
                    <input type="text" id="uCity" placeholder="City" class="w-full p-4 bg-gray-50 rounded-2xl text-sm border-none outline-blue-500 focus:bg-white transition-colors">
                    <div class="relative">
                        <textarea id="uAddr" placeholder="Complete Street Address" class="w-full p-4 bg-gray-50 rounded-2xl text-sm border-none outline-blue-500 focus:bg-white transition-colors" rows="3"></textarea>
                        <button onclick="getCurrentLocation()" class="absolute bottom-3 right-3 bg-blue-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-bold flex items-center gap-1 shadow-md">
                            <i class="fa-solid fa-location-crosshairs"></i> Get GPS
                        </button>
                    </div>
                </div>
                <button onclick="goConfirm()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mt-6 shadow-xl hover:bg-blue-700 transition">Continue to Payment</button>
                <button onclick="closeModal('oModal')" class="w-full mt-2 text-gray-400 text-xs font-bold hover:text-gray-600 transition p-2">Cancel</button>
            </div>
            
            <div id="step2" class="hidden text-center">
                <h3 class="text-xl font-black mb-6">Payment Method</h3>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="setPayment('Online')" id="payOnline" class="payment-option border-2 p-4 rounded-2xl flex flex-col items-center gap-2 active transition-all">
                        <i class="fa-solid fa-building-columns text-blue-600 text-2xl"></i>
                        <span class="text-[10px] font-bold uppercase tracking-widest">Bank/Wallet</span>
                    </button>
                    <button onclick="setPayment('COD')" id="payCOD" class="payment-option border-2 p-4 rounded-2xl flex flex-col items-center gap-2 transition-all">
                        <i class="fa-solid fa-hand-holding-dollar text-green-600 text-2xl"></i>
                        <span class="text-[10px] font-bold uppercase tracking-widest">Cash on Delivery</span>
                    </button>
                </div>
                
                <div id="onlineInfo" class="bg-blue-50 p-5 rounded-2xl mb-4 text-left border border-blue-100">
                    <p class="text-[11px] font-bold text-blue-800 mb-1">Send payment to:</p>
                    <p class="text-sm font-black text-blue-900">Easypaisa: 03423944508</p>
                    <p class="text-[10px] text-blue-600">(Muluk Hussain)</p>
                    <input type="text" id="uTrx" placeholder="Enter Transaction ID (TID)" class="w-full p-3 mt-4 bg-white rounded-xl border-none text-center font-bold outline-blue-500 shadow-inner">
                </div>

                <div class="bg-slate-50 p-5 rounded-2xl mb-6 space-y-2 text-sm font-bold border border-slate-100 shadow-sm">
                    <div class="flex justify-between text-gray-500"><span>Items Total:</span> <span id="fPrice"></span></div>
                    <div class="flex justify-between text-blue-600"><span>Delivery Fee:</span> <span>Rs. 150</span></div>
                    <div class="flex justify-between text-lg border-t pt-3 mt-1 text-gray-800"><span>Total Payable:</span> <span id="fTotal"></span></div>
                </div>

                <button onclick="processOrder()" class="w-full bg-green-500 hover:bg-green-600 transition text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-xl shadow-green-100">
                    <i class="fa-brands fa-whatsapp text-2xl"></i> Finish & Send Order
                </button>
                <button onclick="document.getElementById('step2').classList.add('hidden'); document.getElementById('step1').classList.remove('hidden');" class="w-full mt-4 text-gray-400 text-xs font-bold hover:text-gray-600">Go Back to Address</button>
            </div>
        </div>
    </div>

    <div id="cartModal" class="fixed inset-0 bg-black/80 hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 max-h-[80vh] flex flex-col shadow-2xl modal-animate">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black"><i class="fa-solid fa-cart-shopping text-blue-600 mr-2"></i> My Cart</h2>
                <button onclick="closeModal('cartModal')" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div id="cartItemsList" class="flex-1 overflow-y-auto space-y-3 no-scrollbar pr-1"></div>
            <div class="mt-6 border-t pt-6">
                <div class="flex justify-between font-black text-xl text-gray-800"><span>Grand Total:</span> <span id="cartGrandTotal"></span></div>
                <button onclick="checkoutCart()" class="w-full bg-blue-600 hover:bg-blue-700 transition text-white py-4 rounded-2xl font-bold mt-4 shadow-xl">Place Order Now</button>
            </div>
        </div>
    </div>

    <div id="wishlistModal" class="fixed inset-0 bg-black/80 hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 max-h-[80vh] overflow-y-auto relative shadow-2xl modal-animate">
            <button onclick="closeModal('wishlistModal')" class="absolute top-4 right-4 text-2xl font-bold text-gray-400">×</button>
            <h2 class="text-xl font-black mb-6 flex items-center gap-2 text-red-500"><i class="fa-solid fa-heart"></i> Favorites</h2>
            <div id="wishlistItems" class="grid grid-cols-2 gap-3"></div>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-black/80 hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 max-h-[80vh] overflow-y-auto shadow-2xl modal-animate">
            <h2 class="text-xl font-black mb-6">Your Orders</h2>
            <div id="myOrderList" class="space-y-4"></div>
            <button onclick="closeModal('historyModal')" class="w-full mt-6 bg-gray-100 hover:bg-gray-200 py-3 rounded-xl font-bold transition">Done</button>
        </div>
    </div>

    <div id="aModal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 text-center shadow-2xl">
            <h2 class="text-3xl font-black text-blue-600 mb-2 tracking-tighter">Welcome!</h2>
            <p class="text-gray-400 text-sm mb-8">Login to track your orders</p>
            <input type="email" id="email" placeholder="Email Address" class="w-full p-4 bg-gray-50 rounded-2xl mb-3 border-none outline-blue-500">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl mb-6 border-none outline-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold mb-3 shadow-lg transition">Login</button>
            <button onclick="register()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 py-4 rounded-2xl font-bold transition">Create Account</button>
            <button onclick="closeModal('aModal')" class="mt-6 text-gray-400 text-[10px] font-bold uppercase tracking-widest hover:text-gray-600 transition">Close</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQ0Ckzlgy8GV-uP89ypRHwrMX2Wq-2Mok",
            authDomain: "onlineshoping-bcf3b.firebaseapp.com",
            databaseURL: "https://onlineshoping-bcf3b-default-rtdb.firebaseio.com/",
            projectId: "onlineshoping-bcf3b",
            storageBucket: "onlineshoping-bcf3b.firebasestorage.app",
            messagingSenderId: "634849561995",
            appId: "1:634849561995:web:caa5e8916b5489e1f4f38e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let selected = null;
        let currentUser = null;
        let cart = [];
        let userWishlist = {};
        let isCartOrder = false;
        let paymentMethod = 'Online';
        let activeCategory = 'All';
        let currentVariation = ''; 

        // --- ICON MAPPING LOGIC ---
        function getCatIcon(name) {
            const n = name.toLowerCase();
            if (n.includes('shoe')) return 'fa-shoe-prints';
            if (n.includes('cloth') || n.includes('shirt') || n.includes('dress') || n.includes('pant')) return 'fa-shirt';
            if (n.includes('watch')) return 'fa-stopwatch';
            if (n.includes('mobile') || n.includes('phone') || n.includes('tech') || n.includes('electronic')) return 'fa-mobile-screen-button';
            if (n.includes('grocery') || n.includes('food')) return 'fa-basket-shopping';
            if (n.includes('beauty') || n.includes('cosmetic') || n.includes('makeup')) return 'fa-wand-sparkles';
            if (n.includes('home') || n.includes('furniture')) return 'fa-house';
            if (n.includes('toy') || n.includes('game')) return 'fa-gamepad';
            if (n.includes('bag') || n.includes('purse')) return 'fa-bag-shopping';
            if (n.includes('jewelry') || n.includes('ring') || n.includes('gold')) return 'fa-gem';
            if (n.includes('glass') || n.includes('eye')) return 'fa-glasses';
            if (n.includes('all')) return 'fa-border-all';
            return 'fa-tag'; 
        }

        auth.onAuthStateChanged(user => {
            currentUser = user;
            document.getElementById('loginBtn').classList.toggle('hidden', !!user);
            document.getElementById('userInfo').classList.toggle('hidden', !user);
            if(user) {
                db.ref(`wishlist/${user.uid}`).on('value', snap => {
                    userWishlist = snap.val() || {};
                    renderGrid();
                });
            } else {
                userWishlist = {};
                renderGrid();
            }
        });

        function renderGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            let filtered = activeCategory === 'All' ? window.prods : window.prods.filter(p => p.category === activeCategory);
            filtered?.forEach(p => grid.innerHTML += cardTemplate(p));
        }

        const cardTemplate = (p) => {
            const isLiked = userWishlist[p.id] ? 'liked' : '';
            return `<div class="bg-white rounded-[28px] shadow-sm border border-gray-100 overflow-hidden relative cursor-pointer hover:shadow-xl hover:-translate-y-1 transition duration-300" onclick="view('${p.id}')">
                <img src="${p.images[0]}" class="w-full h-44 object-cover">
                <span class="absolute top-3 left-3 bg-white/90 backdrop-blur-md text-blue-600 text-[9px] px-2 py-1 rounded-lg font-bold uppercase shadow-sm">${p.code}</span>
                <div class="p-4">
                    <h3 class="font-bold text-xs truncate text-gray-800">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <p class="text-blue-600 font-black text-sm">Rs. ${p.price}</p>
                        <button onclick="toggleLike('${p.id}', event)" class="text-gray-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-heart ${isLiked} text-lg"></i></button>
                    </div>
                </div>
            </div>`;
        };

        async function getCurrentLocation() {
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async pos => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                        const data = await res.json();
                        document.getElementById('uAddr').value = data.display_name;
                        if(data.address && (data.address.city || data.address.town)) document.getElementById('uCity').value = data.address.city || data.address.town;
                    } catch(e) { alert("Network error. Enter manually."); }
                    btn.innerHTML = originalHTML;
                }, e => { btn.innerHTML = originalHTML; alert("Location Access Denied."); });
            }
        }

        function toggleLike(id, e) {
            if(e) e.stopPropagation();
            if(!currentUser) return openAuth();
            const ref = db.ref(`wishlist/${currentUser.uid}/${id}`);
            userWishlist[id] ? ref.remove() : ref.set(true);
        }

        function shareProduct(id) {
            const p = window.prods.find(x => x.id === id);
            if (navigator.share) navigator.share({ title: p.name, text: `Check this out: Rs.${p.price}`, url: window.location.href });
        }

        db.ref('categories').on('value', snap => {
            const slider = document.getElementById('catSlider');
            const side = document.getElementById('sidebarCatList');
            
            slider.innerHTML = `<button onclick="filterCat('All')" id="btn-All" class="cat-btn bg-white border min-w-[95px] py-3 rounded-2xl text-[10px] font-bold active-cat shadow-sm transition flex flex-col items-center gap-1.5">
                <i class="fa-solid fa-border-all text-xl"></i> ALL
            </button>`;
            side.innerHTML = `<li><button onclick="filterCat('All'); closeSidebar();" class="w-full text-left p-4 rounded-2xl font-bold bg-blue-50 text-blue-600 border border-blue-100 transition flex items-center gap-3">
                <i class="fa-solid fa-border-all"></i> All Products
            </button></li>`;
            
            snap.forEach(child => {
                const c = child.val();
                if(c.active !== false) {
                    const name = c.name.trim();
                    const icon = getCatIcon(name);
                    slider.innerHTML += `<button onclick="filterCat('${name}')" id="btn-${name}" class="cat-btn bg-white border min-w-[95px] py-3 rounded-2xl text-[10px] font-bold uppercase shadow-sm transition flex flex-col items-center gap-1.5 text-gray-500">
                        <i class="fa-solid ${icon} text-xl"></i> ${name}
                    </button>`;
                    side.innerHTML += `<li><button onclick="filterCat('${name}'); closeSidebar();" class="w-full text-left p-4 rounded-2xl font-bold text-gray-700 hover:bg-blue-50 hover:text-blue-600 border border-transparent hover:border-blue-100 transition flex items-center gap-3 group">
                        <i class="fa-solid ${icon} text-gray-400 group-hover:text-blue-600 w-5"></i> ${name}
                    </button></li>`;
                }
            });
        });

        db.ref('products').on('value', snap => {
            window.prods = []; snap.forEach(c => {
                const p = c.val(); p.id = c.key;
                if(p.category) p.category = p.category.trim();
                window.prods.push(p);
            });
            renderGrid();
        });

        function setPayment(method) {
            paymentMethod = method;
            document.getElementById('payOnline').classList.toggle('active', method === 'Online');
            document.getElementById('payCOD').classList.toggle('active', method === 'COD');
            document.getElementById('onlineInfo').classList.toggle('hidden', method === 'COD');
        }

        function goConfirm() {
            if(!document.getElementById('uName').value || !document.getElementById('uPhone').value || !document.getElementById('uAddr').value) return alert("Please complete the address form!");
            let price = isCartOrder ? cart.reduce((a,b)=>a+(b.price*b.qty),0) : selected.price;
            document.getElementById('fPrice').innerText = 'Rs. ' + price;
            document.getElementById('fTotal').innerText = 'Rs. ' + (parseInt(price) + 150);
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function processOrder() {
            if(!currentUser) return openAuth();
            const trx = document.getElementById('uTrx').value || "Cash on Delivery";
            const orderData = {
                userId: currentUser.uid, 
                details: isCartOrder ? cart.map(i => `${i.name} (${i.variation||'N/A'}) x${i.qty}`).join(', ') : `${selected.name} (${selected.code})${currentVariation?' Opt:'+currentVariation:''}`,
                total: document.getElementById('fTotal').innerText, 
                trxId: trx, status: "Pending", date: new Date().toLocaleString(), 
                image: isCartOrder ? cart[0].images[0] : selected.images[0],
                method: paymentMethod,
                customer: { name: document.getElementById('uName').value, phone: document.getElementById('uPhone').value, address: document.getElementById('uAddr').value, city: document.getElementById('uCity').value }
            };
            db.ref('orders').push(orderData).then(() => {
                const waMsg = encodeURIComponent(`*NEW ORDER*\n📦 Items: ${orderData.details}\n💰 Total: ${orderData.total}\n👤 Name: ${orderData.customer.name}\n📍 Address: ${orderData.customer.address}, ${orderData.customer.city}\n💳 Method: ${orderData.method}\n🆔 TID: ${trx}`);
                window.open(`https://wa.me/923423944508?text=${waMsg}`);
                cart = []; updateCartUI(); closeModal('oModal');
            });
        }

        function view(id) {
            selected = window.prods.find(x => x.id === id);
            document.getElementById('mName').innerText = selected.name;
            document.getElementById('mCode').innerText = selected.code;
            document.getElementById('mDesc').innerText = selected.desc || 'No description available.';
            document.getElementById('mPrice').innerText = selected.price;
            document.getElementById('modalLikeIcon').querySelector('i').className = `fa-solid fa-heart ${userWishlist[id] ? 'liked' : ''} text-lg`;
            const optCont = document.getElementById('pOptionsContainer');
            const optSel = document.getElementById('pOptionsSelect');
            if(selected.sizes && selected.sizes.length > 0) {
                optSel.innerHTML = `<option value="">-- Choose Option --</option>` + selected.sizes.map(s => `<option value="${s}">${s}</option>`).join('');
                optCont.classList.remove('hidden');
            } else { optCont.classList.add('hidden'); optSel.innerHTML = `<option value="">-- Default --</option>`; }
            const slider = document.getElementById('pSlider');
            const dots = document.getElementById('dotsContainer');
            slider.innerHTML = ''; dots.innerHTML = '';
            selected.images.forEach((img, i) => {
                slider.innerHTML += `<div class="w-full flex-shrink-0 snap-center h-full"><img src="${img}" class="w-full h-full object-cover"></div>`;
                dots.innerHTML += `<div class="slider-dot ${i===0?'active-dot':''}"></div>`;
            });
            document.getElementById('pModal').classList.remove('hidden');
        }

        function addToCart(id) {
            const p = window.prods.find(x => x.id === id);
            const optSel = document.getElementById('pOptionsSelect');
            if(!document.getElementById('pOptionsContainer').classList.contains('hidden') && optSel.value === "") return alert("Please select a variation!");
            const variation = optSel.value;
            const existing = cart.find(i => i.id === id && i.variation === variation);
            if(existing) existing.qty++; else cart.push({...p, qty: 1, variation: variation});
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cartItemsList');
            const count = document.getElementById('cartCount');
            const total = document.getElementById('cartGrandTotal');
            list.innerHTML = ''; let gTotal = 0;
            cart.forEach((item, idx) => {
                gTotal += item.price * item.qty;
                list.innerHTML += `<div class="flex gap-4 items-center bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <img src="${item.images[0]}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-1"><p class="text-xs font-bold text-gray-800">${item.name} <span class="text-blue-500">(${item.variation || 'Std'})</span></p><p class="text-blue-600 text-[11px] font-black mt-1">Rs. ${item.price} x ${item.qty}</p></div>
                    <button onclick="removeFromCart(${idx})" class="text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>`;
            });
            count.innerText = cart.length; count.classList.toggle('hidden', cart.length === 0);
            total.innerText = 'Rs. ' + gTotal;
        }

        function removeFromCart(index) { cart.splice(index, 1); updateCartUI(); }
        function filterCat(name) { activeCategory = name; renderGrid(); document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active-cat', b.id === 'btn-'+name)); }
        function search() {
            const val = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            window.prods.filter(p => p.name.toLowerCase().includes(val) || p.code.toLowerCase().includes(val)).forEach(p => grid.innerHTML += cardTemplate(p));
        }
        function openSidebar() { document.getElementById('sidebarOverlay').classList.remove('hidden'); document.getElementById('sidebarMenu').classList.remove('-translate-x-full'); }
        function closeSidebar() { document.getElementById('sidebarOverlay').classList.add('hidden'); document.getElementById('sidebarMenu').classList.add('-translate-x-full'); }
        function openCart() { document.getElementById('cartModal').classList.remove('hidden'); }
        function openAuth() { document.getElementById('aModal').classList.remove('hidden'); }
        function openOrder() { openOrderLogic(); }
        function openOrderLogic() {
            const optSel = document.getElementById('pOptionsSelect');
            if(!document.getElementById('pOptionsContainer').classList.contains('hidden') && optSel.value === "") return alert("Please select a variation!");
            isCartOrder = false; currentVariation = optSel.value;
            closeModal('pModal'); document.getElementById('oModal').classList.remove('hidden'); 
            document.getElementById('step1').classList.remove('hidden'); document.getElementById('step2').classList.add('hidden'); 
        }
        function checkoutCart() { if(cart.length === 0) return alert("Cart is empty!"); isCartOrder = true; closeModal('cartModal'); document.getElementById('oModal').classList.remove('hidden'); document.getElementById('step1').classList.remove('hidden'); document.getElementById('step2').classList.add('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openWishlist() {
            const list = document.getElementById('wishlistItems'); list.innerHTML = '';
            const favs = window.prods.filter(p => userWishlist[p.id]);
            if(favs.length === 0) list.innerHTML = `<p class="col-span-2 text-center text-gray-400 py-10">No favorites yet</p>`;
            favs.forEach(p => list.innerHTML += cardTemplate(p));
            document.getElementById('wishlistModal').classList.remove('hidden');
        }
        function openOrders() {
            const list = document.getElementById('myOrderList'); list.innerHTML = '<p class="text-center text-gray-400">Loading orders...</p>';
            db.ref('orders').orderByChild('userId').equalTo(currentUser.uid).once('value', snap => {
                list.innerHTML = '';
                if(!snap.exists()) list.innerHTML = `<p class="text-center text-gray-400 py-10">No order history found.</p>`;
                snap.forEach(c => {
                    const o = c.val();
                    let color = o.status === "Pending" ? "bg-amber-500" : o.status === "Shipped" ? "bg-blue-500" : "bg-green-500";
                    list.innerHTML += `<div class="p-4 bg-gray-50 border border-gray-100 rounded-[24px] flex gap-4">
                        <img src="${o.image}" class="w-16 h-16 object-cover rounded-2xl shadow-sm">
                        <div class="flex-1"><p class="text-[10px] font-bold text-gray-800 leading-tight">${o.details}</p>
                        <p class="text-blue-600 font-black text-xs mt-1.5">${o.total}</p>
                        <div class="mt-2 text-[8px] px-3 py-1 ${color} text-white rounded-full w-fit uppercase font-bold tracking-widest">${o.status}</div></div>
                    </div>`;
                });
            });
            document.getElementById('historyModal').classList.remove('hidden');
        }
        function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).then(()=>closeModal('aModal')).catch(e=>alert(e.message)); }
        function register() { auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).then(()=>closeModal('aModal')).catch(e=>alert(e.message)); }
        function logout() { auth.signOut(); location.reload(); }

        document.getElementById('pSlider').addEventListener('scroll', (e) => {
            const index = Math.round(e.target.scrollLeft / e.target.clientWidth);
            document.querySelectorAll('.slider-dot').forEach((dot, i) => dot.classList.toggle('active-dot', i === index));
        });
    </script>
</body>
</html>
