<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Store | Premium Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }
        .liked { color: #ef4444 !important; }
        .active-cat { background-color: #2563eb !important; color: white !important; border-color: #2563eb !important; }
        .payment-option.active { border-color: #2563eb; background-color: #eff6ff; }
        .slider-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; transition: 0.3s; }
        .active-dot { background: #2563eb; width: 15px; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="openSidebar()" class="text-gray-600 text-xl h-9 w-9 flex items-center justify-center border rounded-full bg-gray-50">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 class="text-2xl font-black text-blue-600 tracking-tighter">STORE</h1>
            </div>
            
            <div class="flex items-center gap-1">
                <button onclick="openWishlist()" class="text-gray-600 p-2"><i class="fa-solid fa-heart text-xl"></i></button>
                <button onclick="openCart()" class="relative text-gray-600 p-2">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span id="cartCount" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
                </button>
                <button onclick="openAuth()" id="loginBtn" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-sm font-bold ml-2">Login</button>
                <div id="userInfo" class="hidden flex items-center gap-2">
                    <button onclick="openOrders()" class="text-blue-600 text-xs font-bold bg-blue-50 p-2 rounded-lg">Orders</button>
                    <button onclick="logout()" class="text-red-500 text-xs font-bold p-2"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 hidden z-[80] backdrop-blur-sm" onclick="closeSidebar()"></div>
    <div id="sidebarMenu" class="fixed top-0 left-0 w-72 h-full bg-white z-[90] transform -translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-blue-600 text-white">
            <h2 class="font-bold text-xl">Main Menu</h2>
            <button onclick="closeSidebar()" class="text-2xl">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <ul id="sidebarCatList" class="space-y-2"></ul>
            <hr>
            <a href="help.html" class="flex items-center gap-3 p-3 font-bold text-gray-700 hover:bg-gray-50 rounded-xl">
                <i class="fa-solid fa-headset text-blue-500"></i> Help & Support
            </a>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4">
        <div class="relative mb-6">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-400"></i>
            <input type="text" id="search" placeholder="Search by name or code..." onkeyup="search()" class="w-full p-4 pl-12 rounded-2xl border-none shadow-sm outline-blue-500 text-sm">
        </div>

        <div id="catSlider" class="flex gap-3 overflow-x-auto no-scrollbar snap-x mb-8 pb-2"></div>

        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </div>

    <div id="pModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] overflow-hidden relative flex flex-col max-h-[90vh]">
            <button onclick="closeModal('pModal')" class="absolute top-4 right-4 bg-white rounded-full w-8 h-8 z-50 font-bold shadow-lg flex items-center justify-center">&times;</button>
            <div class="relative">
                <div id="pSlider" class="w-full h-72 flex overflow-x-auto snap-x no-scrollbar scroll-smooth"></div>
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1" id="dotsContainer"></div>
            </div>
            <div class="p-6 overflow-y-auto">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="mName" class="text-xl font-black text-gray-800"></h2>
                        <span id="mCode" class="text-[10px] text-blue-600 font-bold uppercase"></span>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black text-green-600">Rs. <span id="mPrice"></span></p>
                    </div>
                </div>
                <p id="mDesc" class="text-gray-500 text-sm mt-4 leading-relaxed"></p>
                
                <div class="flex gap-2 mt-8">
                    <button onclick="shareProduct(selected.id)" class="w-14 h-14 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center text-xl transition"><i class="fa-solid fa-share-nodes"></i></button>
                    <button onclick="toggleLike(selected.id, event)" id="modalLikeIcon" class="w-14 h-14 rounded-2xl bg-gray-100 flex items-center justify-center text-xl transition"><i class="fa-solid fa-heart"></i></button>
                    <button onclick="addToCart(selected.id)" class="w-14 h-14 rounded-2xl bg-orange-100 text-orange-600 flex items-center justify-center text-xl"><i class="fa-solid fa-cart-plus"></i></button>
                    <button onclick="openOrder()" class="flex-1 bg-blue-600 text-white font-bold rounded-2xl shadow-lg">Order Now</button>
                </div>
            </div>
        </div>
    </div>

    <div id="oModal" class="fixed inset-0 bg-black/80 hidden z-[70] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div id="step1">
                <h3 class="text-xl font-black mb-4 flex items-center gap-2"><i class="fa-solid fa-truck"></i> Shipping Details</h3>
                <div class="space-y-3">
                    <select id="uSize" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-blue-500 hidden text-sm font-bold"></select>
                    <input type="text" id="uName" placeholder="Full Name" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none outline-blue-500">
                    <input type="tel" id="uPhone" placeholder="Mobile Number" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none outline-blue-500">
                    <input type="text" id="uCity" placeholder="City" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none outline-blue-500">
                    <textarea id="uAddr" placeholder="Complete Address" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none outline-blue-500" rows="3"></textarea>
                </div>
                <button onclick="goConfirm()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mt-6">Continue</button>
                <button onclick="closeModal('oModal')" class="w-full mt-2 text-gray-400 text-xs font-bold">Cancel</button>
            </div>
            
            <div id="step2" class="hidden text-center">
                <h3 class="text-xl font-black mb-6">Payment Method</h3>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="setPayment('Online')" id="payOnline" class="payment-option border-2 p-4 rounded-2xl flex flex-col items-center gap-2 active">
                        <i class="fa-solid fa-credit-card text-blue-600 text-xl"></i>
                        <span class="text-[10px] font-bold">Online Pay</span>
                    </button>
                    <button onclick="setPayment('COD')" id="payCOD" class="payment-option border-2 p-4 rounded-2xl flex flex-col items-center gap-2">
                        <i class="fa-solid fa-money-bill-wave text-green-600 text-xl"></i>
                        <span class="text-[10px] font-bold uppercase">Cash on Delivery</span>
                    </button>
                </div>
                <div id="onlineInfo" class="bg-blue-50 p-4 rounded-xl mb-4 text-[11px] text-left border">
                    <p><b>Easypaisa:</b> 03423944508 (Muluk Hussain)</p>
                    <input type="text" id="uTrx" placeholder="Enter Transaction ID" class="w-full p-2 mt-2 bg-white rounded border text-center font-bold">
                </div>
                <div class="bg-slate-50 p-4 rounded-xl mb-4 space-y-1 text-sm font-bold">
                    <div class="flex justify-between"><span>Price:</span> <span id="fPrice"></span></div>
                    <div class="flex justify-between text-blue-600"><span>Delivery:</span> <span>Rs. 150</span></div>
                    <div class="flex justify-between text-lg border-t pt-2"><span>Total:</span> <span id="fTotal"></span></div>
                </div>
                <button onclick="processOrder()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i class="fa-brands fa-whatsapp text-xl"></i> WhatsApp Order
                </button>
            </div>
        </div>
    </div>

    <div id="wishlistModal" class="fixed inset-0 bg-black/80 hidden z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 max-h-[80vh] overflow-y-auto relative shadow-2xl">
            <button onclick="closeModal('wishlistModal')" class="absolute top-4 right-4 text-2xl font-bold text-gray-400">&times;</button>
            <h2 class="text-xl font-black mb-6 flex items-center gap-2"><i class="fa-solid fa-heart text-red-500"></i> My Favorites</h2>
            <div id="wishlistItems" class="grid grid-cols-2 gap-3"></div>
        </div>
    </div>

    <div id="cartModal" class="fixed inset-0 bg-black/80 hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 max-h-[80vh] flex flex-col">
            <h2 class="text-xl font-black mb-4">Shopping Cart</h2>
            <div id="cartItemsList" class="flex-1 overflow-y-auto space-y-3 no-scrollbar"></div>
            <div class="mt-4 border-t pt-4">
                <div class="flex justify-between font-black text-lg"><span>Total:</span> <span id="cartGrandTotal"></span></div>
                <button onclick="checkoutCart()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mt-4">Place Order</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-black/80 hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 max-h-[80vh] overflow-y-auto">
            <h2 class="text-xl font-black mb-4">My Orders</h2>
            <div id="myOrderList" class="space-y-3"></div>
            <button onclick="closeModal('historyModal')" class="w-full mt-6 bg-gray-100 py-3 rounded-xl font-bold">Close</button>
        </div>
    </div>

    <div id="aModal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 text-center shadow-2xl">
            <h2 class="text-2xl font-black text-blue-600 mb-6">Login / Register</h2>
            <input type="email" id="email" placeholder="Email Address" class="w-full p-4 bg-gray-50 rounded-2xl mb-3 border-none outline-blue-500">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 border-none outline-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mb-2 shadow-lg">Login</button>
            <button onclick="register()" class="w-full bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold">Create Account</button>
            <button onclick="closeModal('aModal')" class="mt-4 text-gray-400 text-xs font-bold">Close</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQ0Ckzlgy8GV-uP89ypRHwrMX2Wq-2Mok",
            authDomain: "onlineshoping-bcf3b.firebaseapp.com",
            databaseURL: "https://onlineshoping-bcf3b-default-rtdb.firebaseio.com/",
            projectId: "onlineshoping-bcf3b",
            storageBucket: "onlineshoping-bcf3b.firebasestorage.app",
            messagingSenderId: "634849561995",
            appId: "1:634849561995:web:caa5e8916b5489e1f4f38e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let selected = null;
        let currentUser = null;
        let cart = [];
        let userWishlist = {}; // Firebase wishlist data
        let isCartOrder = false;
        let paymentMethod = 'Online';
        let activeCategory = 'All';

        auth.onAuthStateChanged(user => {
            currentUser = user;
            document.getElementById('loginBtn').classList.toggle('hidden', !!user);
            document.getElementById('userInfo').classList.toggle('hidden', !user);
            
            if(user) {
                // Fetch Wishlist from Firebase for current user
                db.ref(`wishlist/${user.uid}`).on('value', snap => {
                    userWishlist = snap.val() || {};
                    renderGrid(); // Re-render to show red hearts
                });
            } else {
                userWishlist = {};
                renderGrid();
            }
        });

        // UI Helpers
        const cardTemplate = (p) => {
            const isLiked = userWishlist[p.id] ? 'liked' : '';
            return `<div class="bg-white rounded-[24px] shadow-sm border border-gray-100 overflow-hidden relative cursor-pointer" onclick="view('${p.id}')">
                <img src="${p.images[0]}" class="w-full h-40 object-cover">
                <span class="absolute top-2 right-2 bg-black/50 text-white text-[8px] px-2 py-0.5 rounded-full font-bold">${p.code}</span>
                <div class="p-3">
                    <h3 class="font-bold text-xs truncate text-gray-800">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <p class="text-blue-600 font-black text-sm">Rs. ${p.price}</p>
                        <button onclick="toggleLike('${p.id}', event)" class="text-gray-300 hover:text-red-500 transition"><i class="fa-solid fa-heart ${isLiked}"></i></button>
                    </div>
                </div>
            </div>`;
        };

        function renderGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            let filtered = activeCategory === 'All' ? window.prods : window.prods.filter(p => p.category === activeCategory);
            filtered?.forEach(p => grid.innerHTML += cardTemplate(p));
        }

        // Like / Wishlist Logic (Firebase)
        function toggleLike(id, e) {
            if(e) e.stopPropagation();
            if(!currentUser) return openAuth();
            
            const ref = db.ref(`wishlist/${currentUser.uid}/${id}`);
            if(userWishlist[id]) {
                ref.remove(); // Remove if already liked
            } else {
                ref.set(true); // Add to firebase
            }
        }

        function openWishlist() {
            if(!currentUser) return openAuth();
            const list = document.getElementById('wishlistItems'); list.innerHTML = '';
            const items = window.prods.filter(p => userWishlist[p.id]);
            items.length ? items.forEach(p => list.innerHTML += cardTemplate(p)) : list.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-10 font-bold">No favorites yet.</p>';
            document.getElementById('wishlistModal').classList.remove('hidden');
        }

        // Share Function
        function shareProduct(id) {
            const p = window.prods.find(x => x.id === id);
            const text = `Check out this ${p.name} on our store! Price: Rs. ${p.price}`;
            if (navigator.share) {
                navigator.share({ title: p.name, text: text, url: window.location.href });
            } else {
                prompt("Copy this link to share:", window.location.href);
            }
        }

        // Database Loaders
        db.ref('categories').on('value', snap => {
            const slider = document.getElementById('catSlider');
            const side = document.getElementById('sidebarCatList');
            slider.innerHTML = `<button onclick="filterCat('All')" id="btn-All" class="cat-btn bg-white border min-w-[80px] py-3 rounded-2xl text-[10px] font-bold active-cat">ALL</button>`;
            side.innerHTML = `<li><button onclick="filterCat('All'); closeSidebar();" class="w-full text-left p-3 rounded-xl font-bold bg-gray-50 border">All Products</button></li>`;
            snap.forEach(child => {
                const name = child.val().name.trim();
                slider.innerHTML += `<button onclick="filterCat('${name}')" id="btn-${name}" class="cat-btn bg-white border min-w-[80px] py-3 rounded-2xl text-[10px] font-bold uppercase">${name}</button>`;
                side.innerHTML += `<li><button onclick="filterCat('${name}'); closeSidebar();" class="w-full text-left p-3 rounded-xl font-bold hover:bg-blue-50 border">${name}</button></li>`;
            });
        });

        db.ref('products').on('value', snap => {
            window.prods = []; snap.forEach(c => {
                const p = c.val(); p.id = c.key;
                if(p.category) p.category = p.category.trim();
                window.prods.push(p);
            });
            renderGrid();
        });

        // Checkout & Payment
        function setPayment(method) {
            paymentMethod = method;
            document.getElementById('payOnline').classList.toggle('active', method === 'Online');
            document.getElementById('payCOD').classList.toggle('active', method === 'COD');
            document.getElementById('onlineInfo').classList.toggle('hidden', method === 'COD');
        }

        function goConfirm() {
            if(!document.getElementById('uName').value || !document.getElementById('uPhone').value) return alert("Fill details!");
            let price = isCartOrder ? cart.reduce((a,b)=>a+(b.price*b.qty),0) : selected.price;
            document.getElementById('fPrice').innerText = 'Rs. ' + price;
            document.getElementById('fTotal').innerText = 'Rs. ' + (parseInt(price) + 150);
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function processOrder() {
            if(!currentUser) return openAuth();
            if(paymentMethod === 'Online' && !document.getElementById('uTrx').value) return alert("Trx ID required!");
            
            const trx = document.getElementById('uTrx').value || "COD Order";
            const orderData = {
                userId: currentUser.uid, 
                details: isCartOrder ? cart.map(i => `${i.name} (${i.qty})`).join(', ') : `${selected.name} (${selected.code})`,
                total: document.getElementById('fTotal').innerText, 
                trxId: trx, 
                status: "Pending",
                date: new Date().toLocaleString(), 
                image: isCartOrder ? cart[0].images[0] : selected.images[0],
                method: paymentMethod,
                customer: {
                    name: document.getElementById('uName').value,
                    phone: document.getElementById('uPhone').value,
                    address: document.getElementById('uAddr').value
                }
            };

            db.ref('orders').push(orderData).then(() => {
                const msg = encodeURIComponent(`*NEW ORDER (${paymentMethod})*\nItems: ${orderData.details}\nTotal: ${orderData.total}\nTrx: ${trx}\nCustomer: ${orderData.customer.name}\nPhone: ${orderData.customer.phone}`);
                window.open(`https://wa.me/923423944508?text=${msg}`);
                cart = []; updateCartUI(); closeModal('oModal');
            });
        }

        // Product View
        function view(id) {
            selected = window.prods.find(x => x.id === id);
            document.getElementById('mName').innerText = selected.name;
            document.getElementById('mCode').innerText = selected.code;
            document.getElementById('mDesc').innerText = selected.desc || '';
            document.getElementById('mPrice').innerText = selected.price;
            document.getElementById('modalLikeIcon').querySelector('i').className = `fa-solid fa-heart ${userWishlist[id] ? 'liked' : ''}`;
            
            const slider = document.getElementById('pSlider');
            const dots = document.getElementById('dotsContainer');
            slider.innerHTML = ''; dots.innerHTML = '';
            selected.images.forEach((img, i) => {
                slider.innerHTML += `<div class="w-full flex-shrink-0 snap-center"><img src="${img}" class="w-full h-full object-cover"></div>`;
                dots.innerHTML += `<div class="slider-dot ${i===0?'active-dot':''}"></div>`;
            });
            document.getElementById('pModal').classList.remove('hidden');
        }

        // Standard Functions
        function filterCat(name) { activeCategory = name; renderGrid(); document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active-cat', b.id === 'btn-'+name)); }
        function search() {
            const val = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            window.prods.filter(p => p.name.toLowerCase().includes(val) || p.code.toLowerCase().includes(val)).forEach(p => grid.innerHTML += cardTemplate(p));
        }
        function addToCart(id) {
            const p = window.prods.find(x => x.id === id);
            const exist = cart.find(i => i.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            updateCartUI(); alert("Added to cart!");
        }
        function updateCartUI() {
            const count = cart.reduce((a, b) => a + b.qty, 0);
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartCount').classList.toggle('hidden', count === 0);
            const list = document.getElementById('cartItemsList');
            let total = 0; list.innerHTML = '';
            cart.forEach((item, idx) => {
                total += item.price * item.qty;
                list.innerHTML += `<div class="flex gap-4 bg-gray-50 p-3 rounded-2xl border">
                    <img src="${item.images[0]}" class="w-16 h-16 object-cover rounded-xl border">
                    <div class="flex-1"><p class="font-bold text-xs">${item.name}</p><p class="text-blue-600 font-black text-[10px]">Rs. ${item.price} x ${item.qty}</p></div>
                    <button onclick="cart.splice(${idx},1); updateCartUI();" class="text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>`;
            });
            document.getElementById('cartGrandTotal').innerText = `Rs. ${total + (cart.length > 0 ? 150 : 0)}`;
        }
        function openSidebar() { document.getElementById('sidebarOverlay').classList.remove('hidden'); document.getElementById('sidebarMenu').classList.remove('-translate-x-full'); }
        function closeSidebar() { document.getElementById('sidebarOverlay').classList.add('hidden'); document.getElementById('sidebarMenu').classList.add('-translate-x-full'); }
        function openCart() { document.getElementById('cartModal').classList.remove('hidden'); }
        function openAuth() { document.getElementById('aModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openOrder() { isCartOrder = false; closeModal('pModal'); document.getElementById('oModal').classList.remove('hidden'); document.getElementById('step1').classList.remove('hidden'); document.getElementById('step2').classList.add('hidden'); }
        function checkoutCart() { isCartOrder = true; closeModal('cartModal'); document.getElementById('oModal').classList.remove('hidden'); }
        function openOrders() {
            const list = document.getElementById('myOrderList'); list.innerHTML = 'Loading...';
            db.ref('orders').orderByChild('userId').equalTo(currentUser.uid).on('value', snap => {
                list.innerHTML = '';
                snap.forEach(c => {
                    const o = c.val();
                    list.innerHTML += `<div class="p-4 bg-gray-50 border rounded-2xl flex gap-4">
                        <img src="${o.image}" class="w-14 h-14 object-cover rounded-xl border">
                        <div class="flex-1">
                            <p class="text-[10px] font-bold text-gray-800">${o.details}</p>
                            <p class="text-blue-600 font-black text-[9px] mt-1">${o.total}</p>
                            <div class="mt-2 text-[8px] px-2 py-0.5 bg-blue-600 text-white rounded-full w-fit uppercase font-bold">${o.status}</div>
                        </div>
                    </div>`;
                });
            });
            document.getElementById('historyModal').classList.remove('hidden');
        }
        function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).then(()=>closeModal('aModal')).catch(e=>alert(e.message)); }
        function register() { auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).then(()=>closeModal('aModal')).catch(e=>alert(e.message)); }
        function logout() { auth.signOut(); }
    </script>
</body>
