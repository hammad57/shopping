<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Professional Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        .active-tab { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">Admin Dashboard</h1>
            <a href="index.html" class="bg-blue-600 hover:bg-blue-700 px-4 py-1 rounded text-sm transition">View Shop</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-list-ul text-blue-500"></i> Categories
                    </h3>
                    <div class="flex flex-col gap-2 mb-4">
                        <input type="hidden" id="editCatKey">
                        <input type="text" id="catInput" placeholder="Category Name" class="p-2 border rounded-lg text-sm outline-blue-500">
                        <div class="flex gap-2">
                            <input type="text" id="catImageInput" placeholder="Icon/Image URL" class="flex-1 p-2 border rounded-lg text-sm outline-blue-500">
                            <button id="saveCatBtn" onclick="saveCategory()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition">Add</button>
                            <button id="cancelCatBtn" onclick="resetCatForm()" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg text-sm font-bold hidden transition">Cancel</button>
                        </div>
                    </div>
                    <ul id="catList" class="space-y-2 max-h-[30vh] overflow-y-auto pr-2"></ul>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-tags text-purple-500"></i> Manage Options
                    </h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newOptInput" placeholder="e.g. Red, XL" class="flex-1 p-2 border rounded-lg text-sm outline-blue-500">
                        <button onclick="addGlobalOption()" class="bg-purple-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Add</button>
                    </div>
                    <div id="globalOptionsPreview" class="space-y-2 max-h-[30vh] overflow-y-auto pr-2"></div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="flex space-x-2 mb-6 overflow-x-auto pb-2">
                    <button onclick="switchTab('uploadTab', this)" class="tab-btn active-tab px-5 py-2.5 rounded-xl font-bold text-sm shadow-md transition whitespace-nowrap">
                        <i class="fa-solid fa-plus-circle mr-1"></i> Upload / Edit
                    </button>
                    <button onclick="switchTab('itemsTab', this)" class="tab-btn bg-white text-gray-600 border px-5 py-2.5 rounded-xl font-bold text-sm shadow-sm hover:bg-gray-50 transition whitespace-nowrap">
                        <i class="fa-solid fa-boxes-stacked mr-1"></i> Inventory Items
                    </button>
                    <button onclick="switchTab('ordersTab', this)" class="tab-btn bg-white text-gray-600 border px-5 py-2.5 rounded-xl font-bold text-sm shadow-sm hover:bg-gray-50 transition whitespace-nowrap">
                        <i class="fa-solid fa-truck-fast mr-1"></i> Customer Orders
                    </button>
                </div>

                <div id="uploadTab" class="tab-content space-y-6">
                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200">
                        <h3 class="font-bold text-gray-700 mb-6 flex items-center gap-2 text-lg">
                            <i class="fa-solid fa-upload text-green-500"></i> <span id="formTitle">Upload New Product</span>
                        </h3>
                        
                        <input type="hidden" id="editKey">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-4">
                                <div>
                                    <label class="text-xs font-bold text-gray-500 uppercase">Category</label>
                                    <select id="pCat" class="w-full p-3 border rounded-xl bg-gray-50 outline-blue-500"></select>
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-gray-500 uppercase">Product Name</label>
                                    <input type="text" id="pName" class="w-full p-3 border rounded-xl outline-blue-500">
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="text-xs font-bold text-gray-500 uppercase">Item Code</label>
                                        <input type="text" id="pCode" class="w-full p-3 border rounded-xl outline-blue-500">
                                    </div>
                                    <div>
                                        <label class="text-xs font-bold text-gray-500 uppercase">Price (Rs.)</label>
                                        <input type="number" id="pPrice" class="w-full p-3 border rounded-xl outline-blue-500">
                                    </div>
                                </div>
                                
                                <div>
                                    <label class="text-xs font-bold text-gray-500 uppercase block mb-2">Assign Options (Check to enable)</label>
                                    <div id="dynamicOptionsContainer" class="grid grid-cols-2 sm:grid-cols-3 gap-2 bg-gray-50 p-3 rounded-xl border border-gray-100 min-h-[50px]">
                                        </div>
                                </div>

                                <div>
                                    <label class="text-xs font-bold text-gray-500 uppercase">Description</label>
                                    <textarea id="pDesc" rows="4" class="w-full p-3 border rounded-xl outline-blue-500"></textarea>
                                </div>
                            </div>

                            <div class="space-y-3 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <label class="text-xs font-bold text-gray-500 uppercase">Image URLs (Up to 4)</label>
                                <input type="text" id="img1" placeholder="Main Image URL" class="w-full p-3 border rounded-xl text-sm bg-white">
                                <input type="text" id="img2" placeholder="Image URL 2" class="w-full p-3 border rounded-xl text-sm bg-white">
                                <input type="text" id="img3" placeholder="Image URL 3" class="w-full p-3 border rounded-xl text-sm bg-white">
                                <input type="text" id="img4" placeholder="Image URL 4" class="w-full p-3 border rounded-xl text-sm bg-white">
                                
                                <button id="saveBtn" onclick="uploadProduct()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition mt-4 text-lg">
                                    Save Product
                                </button>
                                <button id="cancelEditBtn" onclick="resetForm()" class="w-full bg-gray-400 hover:bg-gray-500 text-white font-bold py-2.5 rounded-xl hidden transition mt-2">
                                    Cancel Edit
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="itemsTab" class="tab-content hidden space-y-6">
                    <div id="bulkActions" class="hidden p-4 bg-blue-50 border border-blue-200 rounded-2xl flex flex-wrap items-center justify-between gap-4 shadow-sm">
                        <div class="font-bold text-blue-800 text-sm"><i class="fa-solid fa-check-double mr-1"></i> <span id="selCount">0</span> Items Selected</div>
                        <div class="flex gap-2 flex-1 max-w-sm">
                            <select id="bulkMoveCat" class="flex-1 p-2.5 rounded-xl border-none shadow-sm text-sm outline-blue-500 font-bold text-gray-700"></select>
                            <button onclick="moveSelectedItems()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition shadow-sm">Move</button>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                        <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2 text-lg">
                            <i class="fa-solid fa-boxes-stacked text-blue-500"></i> Inventory Items
                        </h3>
                        <div id="productList" class="space-y-3"></div>
                    </div>
                </div>

                <div id="ordersTab" class="tab-content hidden space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold text-gray-700 flex items-center gap-2 text-lg">
                                <i class="fa-solid fa-clipboard-list text-orange-500"></i> Customer Orders
                            </h3>
                            <span id="orderBadge" class="bg-orange-100 text-orange-700 text-xs font-bold px-3 py-1 rounded-full border border-orange-200">0 Orders</span>
                        </div>
                        <div id="ordersList" class="space-y-4"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyBQ0Ckzlgy8GV-uP89ypRHwrMX2Wq-2Mok",
            authDomain: "onlineshoping-bcf3b.firebaseapp.com",
            databaseURL: "https://onlineshoping-bcf3b-default-rtdb.firebaseio.com/",
            projectId: "onlineshoping-bcf3b",
            storageBucket: "onlineshoping-bcf3b.firebasestorage.app",
            messagingSenderId: "634849561995",
            appId: "1:634849561995:web:caa5e8916b5489e1f4f38e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab', 'bg-blue-600', 'text-white'));
            if(btnElement) btnElement.classList.add('active-tab');
        }

        // --- OPTIONS MANAGEMENT ---
        db.ref('globalOptions').on('value', snap => {
            const container = document.getElementById('dynamicOptionsContainer');
            const preview = document.getElementById('globalOptionsPreview');
            container.innerHTML = '';
            preview.innerHTML = '';
            
            snap.forEach(child => {
                const opt = child.val();
                container.innerHTML += `
                    <label class="flex items-center space-x-2 text-xs text-gray-700 cursor-pointer bg-white p-2 border rounded-lg hover:border-blue-300 transition">
                        <input type="checkbox" name="pSize" value="${opt}" class="w-4 h-4 text-blue-600 rounded"> 
                        <span class="truncate">${opt}</span>
                    </label>`;
                preview.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg border text-xs">
                        <span class="font-bold">${opt}</span>
                        <button onclick="deleteGlobalOption('${child.key}')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });
        });

        function addGlobalOption() {
            const val = document.getElementById('newOptInput').value.trim();
            if(val) db.ref('globalOptions').push(val).then(() => document.getElementById('newOptInput').value = '');
        }

        function deleteGlobalOption(key) {
            if(confirm("Delete this option permanently?")) db.ref('globalOptions').child(key).remove();
        }

        // --- CATEGORIES ---
        db.ref('categories').on('value', snap => {
            const list = document.getElementById('catList');
            const select = document.getElementById('pCat');
            const bulkSelect = document.getElementById('bulkMoveCat');
            list.innerHTML = ''; select.innerHTML = ''; 
            bulkSelect.innerHTML = '<option value="">Target Category...</option>';
            
            snap.forEach(child => {
                const c = child.val();
                const isActive = c.active !== false;
                
                // Show Image if available, else a placeholder box
                const imgDisplay = c.image 
                    ? `<img src="${c.image}" class="w-6 h-6 object-cover rounded shadow-sm border border-gray-200">` 
                    : `<div class="w-6 h-6 bg-gray-100 rounded border flex items-center justify-center text-[10px] text-gray-400"><i class="fa-solid fa-image"></i></div>`;

                list.innerHTML += `<li class="flex justify-between items-center bg-white p-2 rounded-lg text-xs font-bold border shadow-sm mb-1 hover:bg-gray-50 transition">
                    <div class="flex items-center gap-2">
                        ${imgDisplay}
                        <span class="${isActive ? 'text-blue-800' : 'text-gray-400 line-through'}">${c.name}</span> 
                    </div>
                    <div class="flex gap-1">
                        <button onclick="editCat('${child.key}')" class="w-6 h-6 rounded bg-blue-50 hover:bg-blue-100 text-blue-500 transition"><i class="fa-solid fa-pencil text-[10px]"></i></button>
                        <button onclick="toggleCat('${child.key}', ${isActive})" class="w-6 h-6 rounded bg-gray-100 hover:bg-gray-200 transition"><i class="fa-solid ${isActive ? 'fa-eye text-green-500' : 'fa-eye-slash text-gray-500'} text-[10px]"></i></button>
                        <button onclick="deleteCat('${child.key}')" class="w-6 h-6 rounded bg-red-50 hover:bg-red-100 text-red-500 transition"><i class="fa-solid fa-trash-can text-[10px]"></i></button>
                    </div>
                </li>`;
                select.innerHTML += `<option value="${c.name}">${c.name}</option>`;
                bulkSelect.innerHTML += `<option value="${c.name}">${c.name}</option>`;
            });
        });

        function saveCategory() {
            const key = document.getElementById('editCatKey').value;
            const name = document.getElementById('catInput').value.trim();
            const image = document.getElementById('catImageInput').value.trim();

            if(!name) return alert("Category Name is required!");

            if (key) {
                // Update Existing Category
                db.ref('categories').child(key).update({ name, image }).then(() => {
                    resetCatForm();
                });
            } else {
                // Add New Category
                db.ref('categories').push({ name, image, active: true }).then(() => {
                    resetCatForm();
                });
            }
        }

        function editCat(key) {
            db.ref('categories').child(key).once('value', snap => {
                const c = snap.val();
                document.getElementById('editCatKey').value = key;
                document.getElementById('catInput').value = c.name;
                document.getElementById('catImageInput').value = c.image || '';
                
                const saveBtn = document.getElementById('saveCatBtn');
                saveBtn.innerText = "Update";
                saveBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                saveBtn.classList.add('bg-green-600', 'hover:bg-green-700');
                
                document.getElementById('cancelCatBtn').classList.remove('hidden');
            });
        }

        function resetCatForm() {
            document.getElementById('editCatKey').value = '';
            document.getElementById('catInput').value = '';
            document.getElementById('catImageInput').value = '';
            
            const saveBtn = document.getElementById('saveCatBtn');
            saveBtn.innerText = "Add";
            saveBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
            saveBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            
            document.getElementById('cancelCatBtn').classList.add('hidden');
        }

        function toggleCat(id, current) { db.ref('categories').child(id).update({ active: !current }); }
        function deleteCat(id) { if(confirm("Delete Category?")) db.ref('categories').child(id).remove(); }

        // --- PRODUCT UPLOAD ---
        function uploadProduct() {
            const key = document.getElementById('editKey').value;
            const selectedSizes = [];
            document.querySelectorAll('input[name="pSize"]:checked').forEach(cb => selectedSizes.push(cb.value));

            const p = {
                category: document.getElementById('pCat').value,
                name: document.getElementById('pName').value,
                code: document.getElementById('pCode').value,
                price: document.getElementById('pPrice').value,
                desc: document.getElementById('pDesc').value,
                sizes: selectedSizes,
                images: [document.getElementById('img1').value, document.getElementById('img2').value, document.getElementById('img3').value, document.getElementById('img4').value].filter(u => u !== "")
            };
            
            if(!p.name || !p.code || !p.images[0]) return alert("Name, Code, and Main Image are required!");

            const ref = key ? db.ref('products').child(key) : db.ref('products').push();
            ref.set(p).then(() => {
                alert(key ? "Product Updated!" : "Product Saved!");
                resetForm();
            });
        }

        function editProd(key) {
            db.ref('products').child(key).once('value', snap => {
                const p = snap.val();
                document.getElementById('editKey').value = key;
                document.getElementById('pCat').value = p.category;
                document.getElementById('pName').value = p.name;
                document.getElementById('pCode').value = p.code;
                document.getElementById('pPrice').value = p.price;
                document.getElementById('pDesc').value = p.desc;
                
                // Reset and set Checkboxes
                document.querySelectorAll('input[name="pSize"]').forEach(cb => {
                    cb.checked = p.sizes ? p.sizes.includes(cb.value) : false;
                });

                document.getElementById('img1').value = p.images[0] || '';
                document.getElementById('img2').value = p.images[1] || '';
                document.getElementById('img3').value = p.images[2] || '';
                document.getElementById('img4').value = p.images[3] || '';
                
                document.getElementById('formTitle').innerText = "Edit Product";
                document.getElementById('saveBtn').innerText = "Update Product";
                document.getElementById('cancelEditBtn').classList.remove('hidden');
                switchTab('uploadTab');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        function resetForm() {
            document.getElementById('editKey').value = '';
            document.getElementById('pName').value = '';
            document.getElementById('pCode').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pDesc').value = '';
            document.querySelectorAll('input[name="pSize"]').forEach(cb => cb.checked = false);
            document.getElementById('img1').value = '';
            document.getElementById('img2').value = '';
            document.getElementById('img3').value = '';
            document.getElementById('img4').value = '';
            document.getElementById('formTitle').innerText = "Upload New Product";
            document.getElementById('saveBtn').innerText = "Save Product";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        // --- LOAD INVENTORY ---
        db.ref('products').on('value', snap => {
            const list = document.getElementById('productList');
            list.innerHTML = '';
            const grouped = {};
            snap.forEach(child => {
                const p = child.val(); p.key = child.key;
                const cat = p.category || "Uncategorized";
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(p);
            });

            for (const cat in grouped) {
                let itemsHtml = grouped[cat].map(p => `
                    <div class="flex items-center gap-4 p-3 border-t bg-white">
                        <input type="checkbox" class="bulk-cb w-4 h-4" value="${p.key}" onchange="checkBulkSelection()">
                        <img src="${p.images[0]}" class="w-10 h-10 object-cover rounded shadow-sm">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-xs">${p.name}</h4>
                            <p class="text-blue-600 font-bold text-[10px]">${p.code} - Rs. ${p.price}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editProd('${p.key}')" class="text-blue-500 hover:text-blue-700 transition"><i class="fa-solid fa-pencil"></i></button>
                            <button onclick="deleteProd('${p.key}')" class="text-red-500 hover:text-red-700 transition"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                `).join('');

                list.innerHTML += `<details class="mb-2 border rounded-xl overflow-hidden bg-gray-50">
                    <summary class="p-3 font-bold text-sm cursor-pointer flex justify-between items-center">
                        <span>${cat} (${grouped[cat].length})</span>
                        <i class="fa-solid fa-chevron-down text-gray-400"></i>
                    </summary>
                    <div>${itemsHtml}</div>
                </details>`;
            }
        });

        function deleteProd(id) { if(confirm("Delete Product?")) db.ref('products').child(id).remove(); }

        // --- ORDERS ---
        db.ref('orders').on('value', snap => {
            const list = document.getElementById('ordersList');
            list.innerHTML = ''; let count = 0;
            snap.forEach(child => {
                count++; const o = child.val();
                list.innerHTML = `<div class="bg-white border rounded-2xl p-4 shadow-sm">
                    <div class="flex justify-between items-start mb-3 border-b pb-2">
                        <div class="flex gap-3">
                            <img src="${o.image}" class="w-12 h-12 object-cover rounded-lg border">
                            <div><p class="text-[9px] text-gray-400">${o.date}</p><h4 class="font-bold text-xs">${o.details}</h4></div>
                        </div>
                        <select onchange="updateOrderStatus('${child.key}', this.value)" class="text-[10px] font-bold border rounded p-1">
                            <option value="Pending" ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
                            <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                            <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                            <option value="Canceled" ${o.status === 'Canceled' ? 'selected' : ''}>Canceled</option>
                        </select>
                    </div>
                    <div class="text-[11px] bg-gray-50 p-2 rounded-lg grid grid-cols-2">
                        <div><p><b>${o.customer.name}</b></p><p>${o.customer.phone}</p><p class="text-gray-500">${o.customer.address}</p></div>
                        <div class="text-right"><p>${o.method}</p><p class="text-blue-600 font-black">${o.total}</p></div>
                    </div>
                </div>` + list.innerHTML;
            });
            document.getElementById('orderBadge').innerText = `${count} Orders`;
        });

        function updateOrderStatus(id, status) { db.ref('orders').child(id).update({ status }); }
        
        function checkBulkSelection() {
            const count = document.querySelectorAll('.bulk-cb:checked').length;
            document.getElementById('selCount').innerText = count;
            document.getElementById('bulkActions').classList.toggle('hidden', count === 0);
        }

        function moveSelectedItems() {
            const target = document.getElementById('bulkMoveCat').value;
            if(!target) return alert("Select target category!");
            const checked = document.querySelectorAll('.bulk-cb:checked');
            if(confirm(`Move ${checked.length} items to ${target}?`)) {
                const updates = {};
                checked.forEach(cb => updates[`${cb.value}/category`] = target);
                db.ref('products').update(updates).then(() => alert("Moved!"));
            }
        }
    </script>
</body>
</html>
